<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Khánh Duy – Quản Lý Công Trình</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --success: #16a34a;
            --success-light: #dcfce7;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            --warning: #d97706;
            --warning-light: #fef3c7;
            --purple: #7c3aed;
            --purple-light: #ede9fe;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --sidebar-bg: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--gray-50); color: var(--gray-900);
            height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ===== LOGIN SCREEN ===== */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: white; border-radius: 20px; padding: 36px 32px;
            width: 100%; max-width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .login-logo { text-align: center; font-size: 48px; margin-bottom: 8px; }
        .login-title { text-align: center; font-size: 22px; font-weight: 800; color: var(--gray-900); margin-bottom: 4px; }
        .login-sub { text-align: center; font-size: 13px; color: var(--gray-400); margin-bottom: 28px; }
        .login-field { margin-bottom: 16px; }
        .login-field label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
        .login-field input {
            width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200);
            border-radius: 10px; font-size: 15px; outline: none; transition: border 0.15s;
        }
        .login-field input:focus { border-color: var(--primary); }
        .login-btn {
            width: 100%; padding: 13px; background: #c9a227; color: white;
            border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: background 0.15s; margin-top: 4px;
        }
        .login-btn:hover { background: #a8841e; }
        .login-err { color: var(--danger); font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
        #login-screen.hidden { display: none; }

        /* ===== TOPBAR (mobile) ===== */
        .topbar {
            display: none; background: var(--sidebar-bg);
            padding: 10px 14px; align-items: center;
            justify-content: space-between; flex-shrink: 0; z-index: 100;
        }
        .topbar-title { color: white; font-size: 15px; font-weight: 700; }
        .topbar-right  { display: flex; align-items: center; gap: 8px; }
        .hamburger     { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 4px 6px; line-height: 1; }
        .proj-selector-btn {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 7px; color: white; font-size: 13px; font-weight: 500;
            padding: 5px 10px; cursor: pointer; max-width: 160px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ===== LAYOUT ===== */
        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px; min-width: 260px; background: var(--sidebar-bg);
            display: flex; flex-direction: column; height: 100%;
            overflow: hidden; transition: transform 0.25s ease; z-index: 200;
        }
        .sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-logo  { font-size: 20px; margin-bottom: 2px; }
        .sidebar-title { font-size: 14px; font-weight: 700; color: white; }
        .sidebar-sub   { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }

        /* Global views */
        .sidebar-views { padding: 8px 8px 4px; }
        .view-item {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 10px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.75);
            transition: background 0.12s; margin-bottom: 2px;
        }
        .view-item:hover { background: rgba(255,255,255,0.08); }
        .view-item.active { background: rgba(37,99,235,0.3); color: white; }
        .view-item-icon { font-size: 15px; }

        .sidebar-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 4px 0; }

        .sidebar-section {
            padding: 10px 16px 4px; font-size: 10px; font-weight: 700;
            color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.08em;
        }

        .project-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; -webkit-overflow-scrolling: touch; }

        .project-item {
            display: flex; align-items: center; gap: 9px;
            padding: 9px 10px; border-radius: 8px; cursor: pointer;
            margin-bottom: 2px; transition: background 0.12s;
            border-left: 3px solid transparent;
        }
        .project-item:hover { background: rgba(255,255,255,0.08); }
        .project-item.active { background: rgba(37,99,235,0.25); border-left-color: #3b82f6; }

        .project-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .project-dot.active    { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
        .project-dot.completed { background: #64748b; }

        .project-info { flex: 1; min-width: 0; }
        .project-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .project-meta { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }

        .sidebar-footer { padding: 8px 8px 14px; border-top: 1px solid rgba(255,255,255,0.08); }
        .user-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 7px 10px; margin-bottom: 6px;
            background: rgba(255,255,255,0.06); border-radius: 8px;
        }
        .user-bar-name { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 600; }
        .user-bar-role { font-size: 10px; color: rgba(255,255,255,0.35); }
        .btn-logout {
            background: none; border: none; color: rgba(255,255,255,0.4);
            cursor: pointer; font-size: 16px; padding: 2px 4px; line-height: 1;
        }
        .btn-logout:hover { color: var(--danger); }
        .btn-new-project {
            width: 100%; padding: 9px 12px;
            background: rgba(37,99,235,0.35); border: 1px dashed rgba(96,165,250,0.4);
            border-radius: 8px; color: rgba(255,255,255,0.85); cursor: pointer;
            font-size: 13px; font-weight: 500; text-align: center; transition: all 0.15s;
        }
        .btn-new-project:hover { background: rgba(37,99,235,0.5); }

        .btn-cloud {
            width: 100%; padding: 8px 12px; margin-top: 6px;
            background: none; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; color: rgba(255,255,255,0.5); cursor: pointer;
            font-size: 12px; text-align: center; transition: all 0.15s;
        }
        .btn-cloud:hover { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.8); }
        .btn-cloud.connected { color: #4ade80; border-color: rgba(74,222,128,0.4); }
        .btn-sheets { width: 100%; padding: 8px 12px; margin-top: 6px;
            background: none; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; color: rgba(255,255,255,0.5); cursor: pointer;
            font-size: 12px; text-align: center; transition: all 0.15s; }
        .btn-sheets:hover { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.8); }
        .btn-sheets.configured { color: #34d399; border-color: rgba(52,211,153,0.4); }

        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; }

        /* ===== MAIN ===== */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        .main-header {
            background: white; border-bottom: 1px solid var(--gray-200);
            padding: 12px 16px; display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0; gap: 10px;
        }
        .main-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
        .main-meta  { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
        .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

        /* ===== TABS ===== */
        .tabs-bar {
            background: white; border-bottom: 1px solid var(--gray-200);
            display: flex; flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch;
        }
        .tabs-bar::-webkit-scrollbar { display: none; }
        .tab {
            padding: 11px 13px; font-size: 13px; font-weight: 500;
            cursor: pointer; border-bottom: 2px solid transparent;
            color: var(--gray-500); transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
        }
        .tab:hover { color: var(--gray-900); }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .tab-content {
            flex: 1; overflow-y: auto; padding: 16px; background: var(--gray-50);
            -webkit-overflow-scrolling: touch;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
            cursor: pointer; border: none; transition: all 0.15s;
            white-space: nowrap; touch-action: manipulation;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #15803d; }
        .btn-danger  { background: var(--danger); color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: #b45309; }
        .btn-purple  { background: var(--purple); color: white; }
        .btn-purple:hover { background: #6d28d9; }
        .btn-outline { background: white; color: var(--gray-700); border: 1px solid var(--gray-300); }
        .btn-outline:hover { background: var(--gray-50); }
        .btn-ghost { background: none; color: var(--gray-500); border: none; }
        .btn-ghost:hover { color: var(--danger); background: var(--danger-light); }
        .btn-sm { padding: 6px 11px; font-size: 12px; }
        .btn-xs { padding: 3px 8px; font-size: 11px; }

        /* ===== CARDS ===== */
        .card { background: white; border-radius: 12px; border: 1px solid var(--gray-200); padding: 16px; margin-bottom: 14px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; flex-wrap: wrap; }
        .card-title { font-size: 14px; font-weight: 600; color: var(--gray-700); }

        /* ===== STATS ===== */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 14px; }
        .stat-card { background: white; border-radius: 12px; border: 1px solid var(--gray-200); padding: 14px 16px; }
        .stat-label { font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .stat-value { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; word-break: break-all; }
        .stat-value.positive { color: var(--success); }
        .stat-value.negative { color: var(--danger); }
        .stat-value.blue     { color: var(--primary); }
        .stat-value.neutral  { color: var(--gray-900); }
        .stat-value.warning  { color: var(--warning); }
        .stat-value.purple   { color: var(--purple); }

        /* ===== ATTENDANCE TABLE ===== */
        .att-table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--gray-200); -webkit-overflow-scrolling: touch; }
        .att-table { width: 100%; border-collapse: collapse; background: white; min-width: 560px; }
        .att-table th { background: var(--gray-50); padding: 5px 3px; font-size: 10px; font-weight: 600; text-align: center; border-bottom: 1px solid var(--gray-200); color: var(--gray-500); white-space: nowrap; }
        .att-table th.col-name { text-align: left; min-width: 120px; padding-left: 10px; position: sticky; left: 0; z-index: 3; background: var(--gray-50); }
        .att-table th.col-sun  { color: var(--purple); background: var(--purple-light); }
        .att-table th.today-col { background: #eff6ff; }
        .att-table td { padding: 4px 3px; text-align: center; border-bottom: 1px solid var(--gray-100); font-size: 12px; }
        .att-table td.col-name { text-align: left; padding-left: 12px; position: sticky; left: 0; z-index: 2; background: white; }
        .att-table tbody tr:last-child td { border-bottom: none; }
        .att-table td.today-cell { background: #f8faff; }
        .att-cell {
            width: 28px; height: 26px; border-radius: 5px; cursor: pointer;
            border: 1.5px solid var(--gray-200); background: white;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 8px; font-weight: 700; transition: all 0.12s;
            user-select: none; touch-action: manipulation;
        }
        .att-cell:active { transform: scale(0.9); }
        .att-cell.v1  { background: #dcfce7; border-color: #86efac; color: #15803d; }
        .att-cell.v05 { background: #fef9c3; border-color: #fde047; color: #854d0e; }
        .att-cell.v15 { background: #e0f2fe; border-color: #38bdf8; color: #0369a1; font-size: 9px; }
        .att-cell.v2  { background: #dbeafe; border-color: #60a5fa; color: #1d4ed8; font-size: 9px; }
        .att-cell.v0  { background: white; border-color: var(--gray-200); color: var(--gray-300); }
        .att-table tfoot tr td { background: var(--gray-50); font-weight: 700; border-top: 2px solid var(--gray-200); border-bottom: none; font-size: 12px; padding: 9px 6px; }
        .att-table tfoot td.col-name { background: var(--gray-50); }
        .att-table th.col-name, .att-table td.col-name { box-shadow: 2px 0 5px rgba(0,0,0,0.06); }

        /* ===== WEEK NAV ===== */
        .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .week-label { font-size: 13px; font-weight: 700; text-align: center; color: var(--gray-700); flex: 1; min-width: 160px; }
        .legend { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--gray-500); flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 3px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid; font-size: 8px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

        /* ===== DATA TABLE ===== */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { background: var(--gray-50); padding: 8px 10px; font-size: 11px; font-weight: 700; text-align: left; border-bottom: 1px solid var(--gray-200); color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.04em; }
        .data-table td { padding: 10px 10px; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
        .data-table tbody tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover td { background: var(--gray-50); }
        .data-table tfoot td { padding: 10px; background: var(--gray-50); font-weight: 700; font-size: 13px; border-top: 2px solid var(--gray-200); }

        /* ===== SUMMARY TABLE ===== */
        .sum-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .sum-table { width: 100%; border-collapse: collapse; min-width: 400px; }
        .sum-table th { background: var(--gray-50); padding: 8px 10px; font-size: 11px; font-weight: 700; border-bottom: 1px solid var(--gray-200); color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
        .sum-table th.th-worker { text-align: left; min-width: 150px; }
        .sum-table td { padding: 0; border-bottom: 1px solid var(--gray-100); vertical-align: top; }
        .sum-table tbody tr:last-child td { border-bottom: none; }
        .sum-table tfoot td { padding: 10px; background: var(--gray-50); font-weight: 700; font-size: 13px; border-top: 2px solid var(--gray-200); }
        .sum-worker-row { padding: 10px 10px 6px; }
        .sum-worker-name { font-size: 13px; font-weight: 600; }
        .sum-proj-list { padding: 0 10px 8px; }
        .sum-proj-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 3px 0; color: var(--gray-600); border-bottom: 1px dashed var(--gray-100); }
        .sum-proj-row:last-child { border-bottom: none; }

        /* ===== WORKER CARD (workers view) ===== */
        .worker-card {
            display: flex; align-items: center; gap: 10px;
            padding: 12px; background: white; border-radius: 10px;
            border: 1px solid var(--gray-200); margin-bottom: 8px;
        }
        .worker-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--primary-light); color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; flex-shrink: 0;
        }
        .worker-info { flex: 1; min-width: 0; }
        .worker-name { font-size: 14px; font-weight: 600; }
        .worker-meta { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
        .worker-wage { font-size: 13px; font-weight: 700; color: var(--success); }
        .worker-actions { display: flex; gap: 4px; }

        /* ===== TAGS / BADGES ===== */
        .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
        .tag-material { background: #dbeafe; color: #1e40af; }
        .tag-other    { background: var(--purple-light); color: #5b21b6; }
        .tag-advance  { background: var(--success-light); color: var(--success); }
        .tag-current  { background: var(--success-light); color: var(--success); }

        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-active    { background: var(--success-light); color: var(--success); }
        .badge-completed { background: var(--gray-100); color: var(--gray-500); }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15,23,42,0.6);
            display: flex; align-items: flex-end; justify-content: center;
            z-index: 9999; backdrop-filter: blur(3px);
        }
        .modal {
            background: white; border-radius: 20px 20px 0 0;
            padding: 20px 20px 32px; width: 100%; max-width: 540px;
            max-height: 92dvh; overflow-y: auto; -webkit-overflow-scrolling: touch;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
        }
        .modal-handle { width: 36px; height: 4px; background: var(--gray-300); border-radius: 2px; margin: 0 auto 16px; }
        .modal-title  { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--gray-100); }

        /* ===== FORM ===== */
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 5px; }
        .form-input, .form-select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 15px; color: var(--gray-900); outline: none; transition: border-color 0.15s; background: white; -webkit-appearance: none; }
        .form-input:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-hint { font-size: 11px; color: var(--gray-400); margin-top: 3px; }

        /* Checkbox list for assign workers */
        .check-list { max-height: 320px; overflow-y: auto; border: 1.5px solid var(--gray-200); border-radius: 10px; }
        .check-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--gray-100); cursor: pointer; transition: background 0.1s; }
        .check-item:last-child { border-bottom: none; }
        .check-item:hover { background: var(--gray-50); }
        .check-item input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--primary); flex-shrink: 0; cursor: pointer; }
        .check-item-info { flex: 1; min-width: 0; }
        .check-item-name { font-size: 13px; font-weight: 600; }
        .check-item-meta { font-size: 11px; color: var(--gray-400); margin-top: 1px; }

        /* ===== MISC ===== */
        .empty { text-align: center; padding: 32px 16px; color: var(--gray-400); }
        .empty-icon  { font-size: 36px; margin-bottom: 8px; }
        .empty-title { font-size: 15px; font-weight: 600; color: var(--gray-500); margin-bottom: 5px; }
        .empty-desc  { font-size: 12px; }

        .no-project { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--gray-50); gap: 10px; padding: 20px; text-align: center; }

        .pl-table { width: 100%; border-collapse: collapse; }
        .pl-table td { padding: 9px 4px; font-size: 13px; border-bottom: 1px solid var(--gray-100); }
        .pl-table tbody tr:last-child td { border-bottom: none; }
        .pl-table td:last-child { text-align: right; font-weight: 600; }
        .pl-table tfoot td { padding: 10px 4px; font-weight: 700; font-size: 15px; border-top: 2px solid var(--gray-200); }

        .info-box { border-radius: 10px; padding: 11px 13px; font-size: 13px; margin-bottom: 12px; }
        .info-box.blue   { background: var(--primary-light); color: #1e40af; border: 1px solid #93c5fd; }
        .info-box.green  { background: var(--success-light); color: #14532d; border: 1px solid #86efac; }
        .info-box.yellow { background: var(--warning-light); color: #78350f; border: 1px solid #fcd34d; }
        .info-box.red    { background: var(--danger-light);  color: #7f1d1d; border: 1px solid #fca5a5; }
        .info-box.purple { background: var(--purple-light); color: #4c1d95; border: 1px solid #c4b5fd; }

        .pay-row { display: flex; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; gap: 8px; }
        .pay-row:last-child { border-bottom: none; }

        .wage-history { margin-top: 14px; border-top: 1px solid var(--gray-100); padding-top: 14px; }
        .wage-hist-row { display: flex; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--gray-100); font-size: 12px; gap: 8px; }
        .wage-hist-row:last-child { border-bottom: none; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .tr { text-align: right; }
        .tc { text-align: center; }
        .fw7 { font-weight: 700; }
        .fw6 { font-weight: 600; }
        .fs11 { font-size: 11px; }
        .fs12 { font-size: 12px; }
        .c-gray   { color: var(--gray-400); }
        .c-green  { color: var(--success); }
        .c-red    { color: var(--danger); }
        .c-blue   { color: var(--primary); }
        .c-orange { color: var(--warning); }
        .c-purple { color: var(--purple); }
        .divider  { border: none; border-top: 1px solid var(--gray-200); margin: 12px 0; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .topbar { display: flex !important; }
            .sidebar { position: fixed; top: 0; left: 0; height: 100dvh; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block !important; }
            .app-body { flex-direction: column; }
            .main-header { padding: 10px 12px; }
            .main-title  { font-size: 14px; }
            .header-actions .btn { font-size: 11px; padding: 5px 8px; }
            .tab-content { padding: 10px; padding-bottom: 76px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .stat-value { font-size: 15px; }
            .two-col { grid-template-columns: 1fr; }
            .modal { border-radius: 20px 20px 0 0; max-height: 95dvh; }
            .att-table th, .att-table td { padding: 5px 4px; }
            .att-cell { width: 32px; height: 30px; font-size: 9px; }
            .att-table-wrap { padding-bottom: 76px; }
            .mobile-nav { display: flex !important; }
            /* Compact tab bar on mobile — bottom nav handles main 3, tabs-bar handles all */
            .tabs-bar { overflow-x: auto; }
            .tab { padding: 8px 10px; font-size: 12px; }
        }
        @media (min-width: 701px) {
            .topbar { display: none !important; }
            .sidebar { position: static !important; transform: none !important; }
            .app-body { flex-direction: row; height: 100%; }
            .modal { border-radius: 16px; margin: auto; }
            .modal-overlay { align-items: center; }
            .mobile-nav { display: none !important; }
        }

        /* ===== MOBILE BOTTOM NAV ===== */
        .mobile-nav {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 120;
            background: white;
            border-top: 1px solid var(--gray-200);
            padding-bottom: env(safe-area-inset-bottom, 4px);
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
        }
        .mobile-nav-inner {
            display: flex; align-items: stretch; height: 56px;
        }
        .mni {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 2px;
            background: none; border: none; cursor: pointer;
            color: var(--gray-400); font-size: 10px; font-weight: 500;
            padding: 4px 0; transition: color 0.15s; position: relative;
        }
        .mni .mni-icon { font-size: 19px; line-height: 1; }
        .mni.active { color: var(--primary); }
        .mni.active::after {
            content: ''; position: absolute; top: 0; left: 20%; right: 20%;
            height: 2px; background: var(--primary); border-radius: 0 0 2px 2px;
        }
        .mni-fab {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 2px;
            background: none; border: none; cursor: pointer; padding: 4px 0;
        }
        .mni-fab-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--primary); border: none;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 22px; line-height: 1;
            box-shadow: 0 2px 8px rgba(37,99,235,0.4);
            margin-top: -14px; cursor: pointer;
        }
        .mni-fab-label { font-size: 10px; color: var(--gray-400); font-weight: 500; }
    </style>

<script>
// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let S = {
    workers:   [],   // global workers (DATA sheet)
    projects:  [],
    view:      'workers',  // 'workers' | 'summary' | <projectId>
    tab:       'attendance',
    weekStart: null,
};
let confirmCb = null, modalType = null, modalExtra = null;

// ══════════════════════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════════════════════

// ── Firebase ─────────────────────────────────────────────
const FB_KEY = 'ct_firebase_cfg';
const SHEETS_KEY = 'ct_sheets_url';
let fbRef = null;

// ── Auth ─────────────────────────────────────────────────
let authRef = null;
let currentUser = null; // { username, role: 'admin'|'viewer' }

async function hashPassword(pass) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function getSession() {
    try { return JSON.parse(sessionStorage.getItem('ct_session')); } catch(e) { return null; }
}
function setSession(u) { sessionStorage.setItem('ct_session', JSON.stringify(u)); }
function clearSession() { sessionStorage.removeItem('ct_session'); }

async function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const pass     = document.getElementById('login-pass').value;
    const errEl    = document.getElementById('login-err');
    if (!username || !pass) { errEl.textContent = 'Vui lòng nhập đủ thông tin.'; return; }
    if (!authRef) { errEl.textContent = '⏳ Đang kết nối server, thử lại sau vài giây...'; return; }
    errEl.textContent = 'Đang kiểm tra...';
    try {
        const hashed = await hashPassword(pass);
        // Đọc users từ Firebase
        const snap = await authRef.child(username).once('value');
        const user = snap.val();
        if (!user || user.password !== hashed) {
            errEl.textContent = '❌ Sai tên đăng nhập hoặc mật khẩu.';
            return;
        }
        currentUser = { username, role: user.role || 'viewer' };
        setSession(currentUser);
        showApp();
    } catch(e) {
        errEl.textContent = '❌ Lỗi kết nối. Thử lại sau.';
        console.error(e);
    }
}

function doLogout() {
    if (!confirm('Đăng xuất?')) return;
    clearSession();
    currentUser = null;
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-err').textContent = '';
}

// ── Migration from v3/v4 ──────────────────────────────────
function migrateToV5(old) {
    if (!old || !old.projects) return { workers: [], projects: [] };
    const nameToId = {};
    const workers  = [];

    old.projects.forEach(p => {
        (p.employees || []).forEach(emp => {
            const key = (emp.name || '').trim().toLowerCase();
            if (!key) return;
            if (!nameToId[key]) {
                nameToId[key] = emp.id || uid();
                workers.push({
                    id: nameToId[key],
                    name: emp.name.trim(),
                    role: emp.role || '',
                    wage: emp.wage || 0,
                    wageHistory: emp.wageHistory || [{ id: uid(), wage: emp.wage || 0, from: '2020-01-01' }],
                    notes: emp.notes || '',
                });
            }
        });
    });

    const projects = old.projects.map(p => {
        const empToWorker = {};
        (p.employees || []).forEach(emp => {
            const key = (emp.name || '').trim().toLowerCase();
            if (nameToId[key]) empToWorker[emp.id] = nameToId[key];
        });
        const workerIds  = [...new Set(Object.values(empToWorker))];
        const attendance = (p.attendance || []).map(a => ({
            workerId: empToWorker[a.empId] || a.workerId || a.empId,
            date: a.date, type: a.type,
        }));
        const { employees, ...rest } = p;
        return { ...rest, workerIds, attendance, advances: p.advances || [], payments: p.payments || [] };
    });

    return { workers, projects };
}

// ══════════════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function fmtMoney(n) {
    if (!n && n !== 0) return '0 ₫';
    return Math.round(n).toLocaleString('vi-VN') + ' ₫';
}
function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s + 'T00:00:00');
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function fmtShort(d)  { return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; }
function toYMD(d)     { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayYMD()   { return toYMD(new Date()); }

// Week starts Sunday
function getSunday(d) {
    const dt = new Date(d);
    dt.setDate(dt.getDate() - dt.getDay());
    dt.setHours(0,0,0,0);
    return dt;
}
function addDays(d, n) { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt; }
function weekDays(sun) { return Array.from({length:7}, (_,i) => addDays(sun, i)); }

// CN(0) T2(1) T3(2) T4(3) T5(4) T6(5) T7(6)
const DN    = ['CN','T2','T3','T4','T5','T6','T7'];
const DFULL = ['Chủ nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];

function attVal(t)   { return t==='full'||t==='full_night'||t==='full_night_s'?1 : t==='half'?0.5 : t==='overtime'?1 : 0; }

function hasNightOT(t) { return t==='full_night' || t==='full_night_s'; }
function nightOTPay(t, wage, p) { return t==='full_night' ? wage*(p.nightOtRate||1) : t==='full_night_s' ? wage*0.5 : 0; }

// Sunday = index 0 → overtime cycle


function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initials(name) {
    const parts = (name||'').trim().split(/\s+/);
    return parts.length >= 2
        ? (parts[parts.length-2][0] + parts[parts.length-1][0]).toUpperCase()
        : (name||'?')[0].toUpperCase();
}

// ══════════════════════════════════════════════════════════
//  WAGE HISTORY
// ══════════════════════════════════════════════════════════
function effectiveWage(worker, dateStr) {
    if (!worker.wageHistory || !worker.wageHistory.length) return worker.wage || 0;
    const sorted = [...worker.wageHistory].sort((a,b) => a.from.localeCompare(b.from));
    let w = sorted[0].wage;
    for (const h of sorted) {
        if (h.from <= dateStr) w = h.wage;
        else break;
    }
    return w;
}

// ══════════════════════════════════════════════════════════
//  DATA HELPERS
// ══════════════════════════════════════════════════════════
function proj(id)      { return S.projects.find(p => p.id === (id || S.view)); }
function cur()         { return proj(S.view); }
function worker(id)    { return S.workers.find(w => w.id === id); }

// Workers assigned to a project
function projWorkers(p) {
    return (p.workerIds || []).map(id => S.workers.find(w => w.id === id)).filter(Boolean);
}

// Workers active in a specific week
function projWorkersForWeek(p, weekStart) {
    const absent = p.workerAbsentWeeks || [];
    return projWorkers(p).filter(w => {
        // Globally left (leaveDate set on worker)
        if (w.leaveDate && w.leaveDate <= weekStart) return false;
        // Absent only this week
        return !absent.find(a => a.workerId === w.id && a.weekStart === weekStart);
    });
}

// ── Attendance numeric helpers ──────────────────────────────
const ATT_CYCLE = [0, 1, 0.5, 1.5, 2];
function typeToVal(t) { return t==='full'?1: t==='half'?0.5: t==='overtime'?1: t==='full_night'?2: t==='full_night_s'?1.5: 0; }
function recVal(r)    { return r.value !== undefined ? r.value : typeToVal(r.type||''); }
function attCls(v)    { return v===1?'v1': v===0.5?'v05': v===1.5?'v15': v===2?'v2': 'v0'; }
function attLabel(v)  { return v===0.5?'0.5': v>0?String(v):''; }
function cycleAttVal(cur) { const i=ATT_CYCLE.indexOf(cur); return ATT_CYCLE[(i<0?0:i+1)%ATT_CYCLE.length]; }

function getAttVal(p, workerId, date) {
    const r = (p.attendance||[]).find(a => (a.workerId||a.empId) === workerId && a.date === date);
    return r ? recVal(r) : 0;
}

function setAttVal(p, workerId, date, value) {
    if (!p.attendance) p.attendance = [];
    const i = p.attendance.findIndex(a => (a.workerId||a.empId) === workerId && a.date === date);
    if (!value) { if (i >= 0) p.attendance.splice(i, 1); }
    else if (i >= 0) { p.attendance[i] = { workerId, date, value }; }
    else p.attendance.push({ workerId, date, value });
}

function laborCost(p) {
    let t = 0;
    projWorkers(p).forEach(w => {
        (p.attendance||[]).filter(a => (a.workerId||a.empId) === w.id).forEach(a => {
            t += recVal(a) * effectiveWage(w, a.date);
        });
    });
    t += (p.extraWorkerDays||[]).reduce((s,e) => s + (e.amount||0), 0);
    t += (p.workerSupport||[]).reduce((s,x) => s + (x.amount||0), 0);
    return t;
}

function materialCost(p) { return (p.expenses||[]).filter(e=>e.type==='material').reduce((s,e)=>s+(e.amount||0),0); }
function otherCost(p)    { return (p.expenses||[]).filter(e=>e.type==='other').reduce((s,e)=>s+(e.amount||0),0); }
function totalCost(p)    { return laborCost(p) + materialCost(p) + otherCost(p); }
function totalAdvances(p){ return (p.advances||[]).reduce((s,x)=>s+(x.amount||0),0); }
function totalPaid(p)    { return (p.payments||[]).reduce((s,x)=>s+(x.amount||0),0); }

function workerLaborCost(p, w) {
    const attCost = (p.attendance||[]).filter(a=>(a.workerId||a.empId)===w.id)
        .reduce((s,a) => s + recVal(a) * effectiveWage(w, a.date), 0);
    const supportCost = (p.workerSupport||[]).filter(s=>s.workerId===w.id).reduce((s,x)=>s+(x.amount||0),0);
    return attCost + supportCost;
}

function workerTotalDays(p, w) {
    return (p.attendance||[]).filter(a=>(a.workerId||a.empId)===w.id).reduce((s,a)=>s+recVal(a),0);
}

function weekLaborWorker(p, w, days) {
    return days.reduce((s,d) => {
        const ds = toYMD(d);
        return s + getAttVal(p, w.id, ds) * effectiveWage(w, ds);
    }, 0);
}

function weekDaysWorker(p, w, days) {
    return days.reduce((s,d) => s + getAttVal(p, w.id, toYMD(d)), 0);
}

function getWorkerSupport(p, workerId, weekStart) {
    return ((p.workerSupport||[]).find(s => s.workerId===workerId && s.weekStart===weekStart)||{}).amount || 0;
}
function getWorkerAdvance(p, workerId, weekStart) {
    return ((p.workerAdvances||[]).find(a => a.workerId===workerId && a.weekStart===weekStart)||{}).amount || 0;
}
function setWorkerAdvance(p, workerId, weekStart, amount) {
    if (!p.workerAdvances) p.workerAdvances = [];
    const i = p.workerAdvances.findIndex(a => a.workerId===workerId && a.weekStart===weekStart);
    if (!amount || amount <= 0) { if (i >= 0) p.workerAdvances.splice(i, 1); }
    else if (i >= 0) p.workerAdvances[i].amount = amount;
    else p.workerAdvances.push({ workerId, weekStart, amount });
}
function totalWorkerAdvances(p) {
    return (p.workerAdvances||[]).reduce((s,a) => s+(a.amount||0), 0);
}
function setWorkerSupport(p, workerId, weekStart, amount) {
    if (!p.workerSupport) p.workerSupport = [];
    const i = p.workerSupport.findIndex(s => s.workerId===workerId && s.weekStart===weekStart);
    if (!amount || amount <= 0) { if (i >= 0) p.workerSupport.splice(i, 1); }
    else if (i >= 0) p.workerSupport[i].amount = amount;
    else p.workerSupport.push({ id: uid(), workerId, weekStart, amount });
}

function getExtraWorkersDay(p, date) {
    return (p.extraWorkerDays||[]).filter(e => e.date === date);
}
function weekDailyExtras(p, days) {
    return days.reduce((s,d) => {
        const ds = toYMD(d);
        return s + getExtraWorkersDay(p, ds).reduce((ss,e)=>ss+(e.amount||0),0);
    }, 0);
}
function weekExtraDaysAll(p, days) {
    return days.reduce((s,d) => {
        const ds = toYMD(d);
        return s + (p.extraWorkerDays||[]).filter(e=>e.date===ds).reduce((ss,e)=>ss+(e.value??1),0);
    }, 0);
}
function getWeeklyExtraWorkers(p, weekStart) {
    return (p.weeklyExtraWorkers||[]).filter(e => e.weekStart === weekStart);
}
function addWeeklyExtraWorker(projId, weekStart, workerId) {
    const p = proj(projId);
    if (!p) return;
    if (!p.weeklyExtraWorkers) p.weeklyExtraWorkers = [];
    if (!p.weeklyExtraWorkers.find(e => e.weekStart===weekStart && e.workerId===workerId))
        p.weeklyExtraWorkers.push({ id: uid(), weekStart, workerId });
    save();
    document.getElementById('modal-content').innerHTML = modalContent();
    renderMain();
}
function removeWorkerFromWeek(projId, workerId, weekStart) {
    const p = proj(projId);
    if (!p) return;
    if (!p.workerAbsentWeeks) p.workerAbsentWeeks = [];
    p.workerAbsentWeeks.push({ workerId, weekStart });
    save(); renderAll();
}

function restoreWorkerThisWeek(projId, workerId, weekStart) {
    const p = proj(projId);
    if (!p) return;
    p.workerAbsentWeeks = (p.workerAbsentWeeks||[]).filter(a => !(a.workerId===workerId && a.weekStart===weekStart));
    save(); renderAll();
}

function removeWeeklyExtraWorker(projId, workerId, weekStart) {
    const p = proj(projId);
    if (!p) return;
    p.weeklyExtraWorkers = (p.weeklyExtraWorkers||[]).filter(e => !(e.weekStart===weekStart && e.workerId===workerId));
    save(); renderAll();
}
function weekExtraCost(p, workerId, days) {
    return days.reduce((s,d) => {
        const ds = toYMD(d);
        const e = (p.extraWorkerDays||[]).find(x => x.date===ds && x.workerId===workerId);
        return s + (e ? e.amount||0 : 0);
    }, 0);
}
function weekExtraDays(p, workerId, days) {
    return days.reduce((s,d) => {
        const ds = toYMD(d);
        const e = (p.extraWorkerDays||[]).find(x => x.date===ds && x.workerId===workerId);
        return s + (e ? (e.value ?? 1) : 0);
    }, 0);
}

    const TAB_LABEL = { attendance:'📋 Chấm công', expenses:'💰 Chi phí', advances:'💵 Tạm ứng', overview:'📊 Tổng quan', payments:'💵 Thanh toán' };
    if (S.view === 'workers')      { if(btn) btn.textContent='👷 Thợ';        if(title) title.textContent='👷 Danh sách thợ'; }
    else if (S.view === 'summary') { if(btn) btn.textContent='📊 Tổng lương'; if(title) title.textContent='📊 Tổng lương tuần'; }
    else if (S.view === 'report')  { if(btn) btn.textContent='📈 Báo cáo';    if(title) title.textContent='📈 Báo cáo công trình'; }
    else if (S.view === 'floorplan') { if(btn) btn.textContent='🏠 Sơ đồ'; if(title) title.textContent='🏠 Sơ đồ nhà'; }
    else {
        const p = cur();
        const tabLbl = TAB_LABEL[S.tab] || '';
        if (btn)   btn.textContent   = p ? p.name : 'Menu';
        if (title) title.innerHTML   = p ? `<span style="font-size:11px;opacity:.6;">${tabLbl}</span><br>${esc(p.name)}` : '🏗️';
    }
}

function updateBottomNav() {
    const ids = ['mni-proj','mni-att','mni-exp','mni-ovr'];
    ids.forEach(id => document.getElementById(id)?.classList.remove('active'));
    const p = cur();
    if (!p || S.view === 'workers' || S.view === 'summary' || S.view === 'report') {
        document.getElementById('mni-proj')?.classList.add('active');
    } else {
        const map = { attendance:'mni-att', expenses:'mni-exp', overview:'mni-ovr' };
        const id = map[S.tab];
        if (id) document.getElementById(id)?.classList.add('active');
    }
}

function mniProj() {
    // If already on a global view, open sidebar; otherwise toggle sidebar
    toggleSidebar();
}

function mniTab(tab) {
    const p = cur();
    if (p) {
        S.tab = tab;
        renderMain();
        updateBottomNav();
        updateTopbar();
        closeSidebar();
    } else {
        // No project selected — open sidebar to pick one
        toggleSidebar();

}

function mniFab() {
    const p = cur();
    if (p && p.status === 'active') {
        openModal('add-expense');
    } else if (!p) {
        toggleSidebar();
    } else {
        openModal('add-expense');

}

function renderSummaryView() {
    const sunday = S.weekStart;
    const days   = weekDays(sunday);
    const today  = todayYMD();

    // Build summary data
    const activeProjs = S.projects.filter(p => p.workerIds && p.workerIds.length);
    const rows = [];
    let grandDays = 0, grandAmount = 0;

    S.workers.forEach(w => {
        const projData = activeProjs
            .filter(p => (p.workerIds||[]).includes(w.id))
            .map(p => {
                const wd = weekDaysWorker(p, w, days);
                const wa = weekLaborWorker(p, w, days);
                return { proj: p, days: wd, amount: wa };
            })
            .filter(x => x.days > 0);

        if (!projData.length) return;
        const totalDays   = projData.reduce((s,x)=>s+x.days,0);
        const totalAmount = projData.reduce((s,x)=>s+x.amount,0);
        grandDays   += totalDays;
        grandAmount += totalAmount;
        rows.push({ w, projData, totalDays, totalAmount });
    });

    return `
    <div class="main-header">
        <div>
            <div class="main-title">📊 Tổng lương theo tuần</div>

        <div class="week-nav" style="margin-bottom:14px;">
            <span class="week-label" style="text-align:left;">
                Tuần CN ${fmtShort(sunday)} – T7 ${fmtShort(days[6])}, ${sunday.getFullYear()}
            </span>
        </div>

        ${!rows.length ? `<div class="card"><div class="empty">
            <div class="empty-icon">📊</div>
            <div class="empty-title">Tuần này chưa có dữ liệu</div>
            <div class="empty-desc">Chấm công các công trình để xem tổng lương ở đây</div>
        </div></div>` : `

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Tổng thợ làm việc</div><div class="stat-value neutral">${rows.length} thợ</div></div>
            <div class="stat-card"><div class="stat-label">Tổng ngày công</div><div class="stat-value blue">${grandDays}N</div></div>
            <div class="stat-card"><div class="stat-label">Tổng lương tuần</div><div class="stat-value negative">${fmtMoney(grandAmount)}</div></div>

        <!-- Tổng theo công trình -->

                TỔNG THEO CÔNG TRÌNH
            </div>
            ${activeProjs.map(p => {
                const pDays   = projWorkersForWeek(p, toYMD(sunday)).reduce((s,w)=>s+weekDaysWorker(p,w,days),0)
                              + weekExtraDaysAll(p, days);
                const pMoney  = projWorkersForWeek(p, toYMD(sunday)).reduce((s,w)=>s+weekLaborWorker(p,w,days),0)
                              + weekDailyExtras(p, days);
                const pWorkers = rows.filter(r=>r.projData.some(x=>x.proj.id===p.id)).length;
                if (!pDays && !pMoney) return '';
                return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--gray-100);cursor:pointer;" onclick="selectView('${p.id}')">

        </div>`}
    </div>`;
}

// ══════════════════════════════════════════════════════════
//  REPORT VIEW
// ══════════════════════════════════════════════════════════
function renderReportView() {
    if (!S.reportFrom) S.reportFrom = '';
    if (!S.reportTo)   S.reportTo   = '';
    const from = S.reportFrom, to = S.reportTo;

    const projs = S.projects;
    if (!projs.length) return `<div class="main-header"><div class="main-title">📈 Báo cáo công trình</div></div>
        <div class="tab-content"><div class="card"><div class="empty"><div class="empty-icon">📈</div>
        <div class="empty-desc">Chưa có công trình nào</div></div></div></div>`;

    function inRange(date) {
        if (from && date < from) return false;
        if (to   && date > to)   return false;
        return true;
    }
    function calcProj(p) {
        const adv   = (p.advances||[]).filter(a=>inRange(a.date)).reduce((s,a)=>s+(a.amount||0),0);
        const mat   = (p.expenses||[]).filter(e=>e.type==='material'&&inRange(e.date)).reduce((s,e)=>s+(e.amount||0),0);
        const other = (p.expenses||[]).filter(e=>e.type==='other'&&inRange(e.date)).reduce((s,e)=>s+(e.amount||0),0);
        const workers = projWorkers(p);
        const wRows = workers.map(w => {
            const days = (p.attendance||[]).filter(a=>(a.workerId||a.empId)===w.id&&inRange(a.date));
            const nd   = days.reduce((s,a)=>s+recVal(a),0);
            const amt  = days.reduce((s,a)=>s+recVal(a)*effectiveWage(w,a.date),0);
            const sup  = (p.workerSupport||[]).filter(x=>x.workerId===w.id&&(!from&&!to||inRange(x.weekStart))).reduce((s,x)=>s+(x.amount||0),0);
            return { w, nd, amt: amt+sup };
        }).filter(r=>r.nd>0||r.amt>0);
        const labor = wRows.reduce((s,r)=>s+r.amt,0)
            + (p.extraWorkerDays||[]).filter(e=>inRange(e.date)).reduce((s,e)=>s+(e.amount||0),0);
        const paid  = (p.payments||[]).filter(x=>inRange(x.date)).reduce((s,x)=>s+(x.amount||0),0);
        const total = labor + mat + other;
        const profit = adv - total;
        return { adv, mat, other, labor, total, profit, paid, wRows };
    }

    let gAdv=0,gLabor=0,gMat=0,gOther=0,gProfit=0;
    const calcs = projs.map(p => { const c=calcProj(p); gAdv+=c.adv; gLabor+=c.labor; gMat+=c.mat; gOther+=c.other; gProfit+=c.profit; return {p,...c}; });

    const filterBar = `<div class="card" style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <span style="font-size:13px;font-weight:600;color:var(--gray-600);">Lọc thời gian:</span>
            <input type="date" style="border:1px solid var(--gray-200);border-radius:8px;padding:5px 10px;font-size:13px;"
                value="${from}" onchange="S.reportFrom=this.value;renderMain()">
            <span style="color:var(--gray-400);">–</span>
            <input type="date" style="border:1px solid var(--gray-200);border-radius:8px;padding:5px 10px;font-size:13px;"
                value="${to}" onchange="S.reportTo=this.value;renderMain()">
            ${(from||to)?`<button onclick="S.reportFrom='';S.reportTo='';renderMain()"
                style="font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--gray-200);background:white;cursor:pointer;color:var(--gray-500);">✕ Xóa lọc</button>`:''}
        </div>
    </div>`;

    const grandStats = `<div class="stats-grid" style="margin-bottom:14px;">
        <div class="stat-card"><div class="stat-label">Tổng tạm ứng</div><div class="stat-value positive">${fmtMoney(gAdv)}</div></div>
        <div class="stat-card"><div class="stat-label">Tổng chi phí</div><div class="stat-value negative">${fmtMoney(gLabor+gMat+gOther)}</div></div>
        <div class="stat-card"><div class="stat-label">${gProfit>=0?'💰 Lợi nhuận':'📉 Lỗ'}</div>
            <div class="stat-value ${gProfit>=0?'positive':'negative'}">${gProfit<0?'-':''}${fmtMoney(Math.abs(gProfit))}</div></div>
    </div>`;

    const projCards = calcs.map(({p, adv, mat, other, labor, total, profit, paid, wRows}) => {
        const owed = Math.max(0, labor - paid);
        const rev  = p.revenue || 0;
        const pid  = 'rc-' + p.id;
        return `<div class="card" style="margin-bottom:8px;padding:0;overflow:hidden;">
            <!-- Compact header — always visible, click to expand -->
            <div onclick="toggleReportCard('${p.id}')" style="cursor:pointer;display:flex;align-items:center;gap:10px;padding:12px 14px;">
                <div style="flex:1;min-width:0;">
                    <div style="font-size:14px;font-weight:700;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.name)}</div>
                    <div class="fs11 c-gray">${p.status==='active'?'🟢 Đang thi công':'✅ Hoàn thành'} · ${fmtDate(p.startDate)}</div>
                </div>
                <div style="text-align:right;flex-shrink:0;">
                    <div class="fs12 c-gray">Tạm ứng: <span class="fw6 c-green">${fmtMoney(adv)}</span></div>
                    <div class="fs12">Tổng chi: <span class="fw6">${fmtMoney(total)}</span></div>
                    <div class="fs12 fw7" style="color:${profit>=0?'var(--success)':'var(--danger)'};">${profit>=0?'Lãi':'Lỗ'} ${profit<0?'-':''}${fmtMoney(Math.abs(profit))}</div>
                </div>
                <span id="${pid}-arrow" style="color:var(--gray-400);font-size:12px;flex-shrink:0;">▶</span>
            </div>
            <!-- Detail — hidden by default -->
            <div id="${pid}" style="display:none;border-top:1px solid var(--gray-100);padding:12px 14px;">
                <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
                    <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();selectView('${p.id}')">Vào công trình →</button>
                </div>
                <div class="two-col">
                    <div>
                        <div style="font-size:11px;font-weight:700;color:var(--gray-400);margin-bottom:6px;letter-spacing:.05em;">BÁO CÁO LÃI/LỖ</div>
                        <table class="pl-table"><tbody>
                            <tr><td style="color:var(--success);font-weight:700;">THU</td><td></td></tr>
                            <tr><td style="padding-left:12px;">Tạm ứng</td><td class="c-green">${fmtMoney(adv)}</td></tr>
                            ${rev?`<tr><td style="padding-left:12px;font-size:11px;color:var(--gray-400);">Giá trị HĐ</td><td class="fs11 c-gray">${fmtMoney(rev)}</td></tr>`:''}
                            <tr><td style="color:var(--danger);font-weight:700;padding-top:8px;">CHI</td><td></td></tr>
                            <tr><td style="padding-left:12px;">Nhân công</td><td>${fmtMoney(labor)}</td></tr>
                            <tr><td style="padding-left:24px;" class="fs12 c-gray">Đã trả</td><td class="c-green fs12">-${fmtMoney(paid)}</td></tr>
                            <tr><td style="padding-left:24px;" class="fs12 c-gray">Còn nợ</td><td class="${owed>0?'c-orange':'c-green'} fs12">${fmtMoney(owed)}</td></tr>
                            <tr><td style="padding-left:12px;">Vật liệu</td><td>${fmtMoney(mat)}</td></tr>
                            <tr><td style="padding-left:12px;">Chi khác</td><td>${fmtMoney(other)}</td></tr>
                        </tbody><tfoot><tr>
                            <td class="fw7">${profit>=0?'💰 Lãi':'📉 Lỗ'}</td>
                            <td class="${profit>=0?'c-green':'c-red'} fw7">${profit<0?'-':''}${fmtMoney(Math.abs(profit))}</td>
                        </tr></tfoot></table>
                    </div>
                    <div>
                        <div style="font-size:11px;font-weight:700;color:var(--gray-400);margin-bottom:6px;letter-spacing:.05em;">TỪNG THỢ</div>
                        ${!wRows.length ? `<div class="fs12 c-gray">Chưa có dữ liệu</div>` : `
                        <table class="data-table">
                            <thead><tr><th>Thợ</th><th class="tc">Ngày</th><th class="tr">Tiền</th></tr></thead>
                            <tbody>
                            ${wRows.map(({w,nd,amt})=>`<tr>
                                <td><div class="fw6 fs12">${esc(w.name)}</div></td>
                                <td class="tc fs12">${nd>0?nd+'N':'-'}</td>
                                <td class="tr fw6 c-blue fs12">${fmtMoney(amt)}</td>
                            </tr>`).join('')}
                            </tbody>
                            <tfoot><tr>
                                <td class="fw7">Tổng</td>
                                <td class="tc fw7">${wRows.reduce((s,r)=>s+r.nd,0)}N</td>
                                <td class="tr fw7 c-blue">${fmtMoney(wRows.reduce((s,r)=>s+r.amt,0))}</td>
                            </tr></tfoot>
                        </table>`}
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');

    return `
    <div class="main-header">
        <div><div class="main-title">📈 Báo cáo công trình</div>
        <div class="main-meta">${projs.length} công trình</div></div>
    </div>
    <div class="tab-content">${filterBar}${grandStats}${projCards}</div>`;
}

            ${p.status==='active'
                ? `<button class="btn btn-danger btn-sm" onclick="askEndProj()">🔴 Kết thúc</button>`
                : `<button class="btn btn-ghost btn-sm" onclick="askDeleteProj()">🗑️</button>`}
        </div>
    </div>
    <div class="tabs-bar">
        ${tabs.map(t=>`<div class="tab ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</div>`).join('')}
    </div>
    <div class="tab-content" id="tab-content">
        ${renderTab(p)}
    </div>`;
}

function renderTab(p) {
    switch(S.tab) {
        case 'attendance': return renderAttendance(p);
        case 'expenses':   return renderExpenses(p);
        case 'advances':   return renderAdvances(p);
        case 'overview':   return renderOverview(p);
        default: return '';
    }
}

// ── ATTENDANCE ────────────────────────────────────────────
function renderAttendance(p) {
    const workers = projWorkers(p);

    if (!S.workers.length) {
        return `<div class="card"><div class="empty">
            <div class="empty-icon">👷</div>
            <div class="empty-title">Chưa có thợ nào</div>
            <div class="empty-desc">Thêm thợ vào danh sách chung trước</div>
            <button class="btn btn-primary" style="margin-top:14px;" onclick="selectView('workers')">👷 Thêm thợ</button>
        </div></div>`;
    }

    const assignBtn = p.status==='active'
        ? `<button class="btn btn-purple btn-sm" onclick="openModal('assign-workers')">👷 Phân công thợ</button>`
        : '';

    if (!workers.length) {
        return `<div class="card"><div class="empty">
            <div class="empty-icon">📋</div>
            <div class="empty-title">Chưa phân công thợ</div>
            <div class="empty-desc">Chọn thợ từ danh sách chung để chấm công</div>
            <div style="margin-top:14px;">${assignBtn}</div>
        </div></div>`;
    }

    const sunday    = S.weekStart;
    const days      = weekDays(sunday);
    const today     = todayYMD();
    const extraTotal = weekDailyExtras(p, days);
    const sunStr = toYMD(sunday);
    const weekWorkers = projWorkersForWeek(p, sunStr);
    const weekSupportTotal = weekWorkers.reduce((s,w)=>s+getWorkerSupport(p,w.id,sunStr),0);
    const weekTotal = weekWorkers.reduce((s,w)=>s+weekLaborWorker(p,w,days),0) + extraTotal + weekSupportTotal;

    return `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <div class="week-nav" style="margin-bottom:0;flex:1;">
            <button class="btn btn-outline btn-sm" onclick="prevWeek()">‹</button>
            <span class="week-label">Tuần ${fmtShort(sunday)} – ${fmtShort(days[6])}, ${sunday.getFullYear()}</span>
            <button class="btn btn-outline btn-sm" onclick="nextWeek()">›</button>
            <button class="btn btn-outline btn-sm" onclick="goToday()">Hôm nay</button>
        </div>
        ${assignBtn}
    </div>

    <div class="legend" style="margin-bottom:10px;">
        <span style="font-weight:600;color:var(--gray-500);">Bấm để chuyển:</span>
        <span class="legend-item"><div class="legend-dot" style="background:white;border-color:#e5e7eb;color:#d1d5db;">0</div> Nghỉ</span>
        <span class="legend-item"><div class="legend-dot" style="background:#dcfce7;border-color:#86efac;color:#15803d;">1</div> Cả ngày</span>
        <span class="legend-item"><div class="legend-dot" style="background:#fef9c3;border-color:#fde047;color:#854d0e;">0.5</div> Nửa ngày</span>
        <span class="legend-item"><div class="legend-dot" style="background:#e0f2fe;border-color:#38bdf8;color:#0369a1;font-size:8px;">1.5</div> 1N + TC &lt;4h</span>
        <span class="legend-item"><div class="legend-dot" style="background:#dbeafe;border-color:#60a5fa;color:#1d4ed8;font-size:8px;">2</div> 1N + TC &gt;4h</span>
    </div>

    <div class="att-table-wrap">
    <table class="att-table">
        <thead><tr>
            <th class="col-name">Thợ</th>
            ${days.map((d,i) => {
                const isToday = toYMD(d) === today;
                const isSun   = i === 0;
                return `<th class="${isSun?'col-sun':''} ${isToday?'today-col':''}">
                    ${DN[i]}<div style="font-weight:400;font-size:9px;color:var(--gray-400);">${fmtShort(d)}</div>
                </th>`;
            }).join('')}
            <th>Ngày</th><th>Tiền</th><th style="color:var(--warning);white-space:nowrap;">Hỗ trợ</th><th style="color:var(--danger);white-space:nowrap;">Ứng</th>
        </tr></thead>
        <tbody>
        ${weekWorkers.map(w => {
            const wd = weekDaysWorker(p, w, days);
            const wp = weekLaborWorker(p, w, days);
            return `<tr>
                <td class="col-name">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:4px;">
                        <div class="fw6" style="font-size:13px;">${esc(w.name)}</div>
                        ${p.status==='active'?`<button onclick="removeWorkerFromWeek('${p.id}','${w.id}','${sunStr}')"
                            title="Nghỉ từ tuần này trở đi"
                            style="background:none;border:none;color:var(--gray-300);cursor:pointer;font-size:15px;line-height:1;padding:0 2px;flex-shrink:0;"
                            onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--gray-300)'">×</button>`:''}
                    </div>
                    <div class="fs11 c-gray">${esc(w.role||'')} · ${fmtMoney(effectiveWage(w,toYMD(days[0])))}/N</div>
                </td>
                ${days.map((d,i) => {
                    const ds    = toYMD(d);
                    const v     = getAttVal(p, w.id, ds);
                    const isToday = ds === today;
                    return `<td class="tc ${isToday?'today-cell':''}">
                        <div class="att-cell ${attCls(v)}"
                             onclick="toggleAtt('${p.id}','${w.id}','${ds}')"
                             title="${DFULL[i]}">
                            ${attLabel(v)}
                        </div>
                    </td>`;
                }).join('')}
                <td class="tc fw6 fs12" style="color:var(--gray-700);">${wd>0?wd+'N':'-'}</td>
                <td class="tr fw6 c-blue fs12">${(()=>{const s=getWorkerSupport(p,w.id,sunStr);return (wp+s)>0?fmtMoney(wp+s):'-';})()}</td>
                <td class="tr fs12">${p.status==='active'?`<div onclick="editWorkerSupport('${p.id}','${w.id}','${sunStr}')"
                     style="cursor:pointer;padding:2px 4px;border-radius:6px;min-width:40px;text-align:right;
                            ${getWorkerSupport(p,w.id,sunStr)?'color:var(--warning);font-weight:700;':'color:var(--gray-300);'}">
                     ${getWorkerSupport(p,w.id,sunStr)?fmtMoney(getWorkerSupport(p,w.id,sunStr)):'+'}
                </div>`:'-'}</td>
                ${(()=>{ const adv=getWorkerAdvance(p,w.id,sunStr);
                    return `<td class="tr fs12">${p.status==='active'?`<div onclick="editWorkerAdvance('${p.id}','${w.id}','${sunStr}')"
                     style="cursor:pointer;padding:2px 4px;border-radius:6px;min-width:40px;text-align:right;
                            ${adv?'color:var(--danger);font-weight:700;':'color:var(--gray-300);'}">
                     ${adv?fmtMoney(adv):'+'}</div>`:adv?fmtMoney(adv):'-'}</td>`; })()}
            </tr>`;
        }).join('')}
        ${getWeeklyExtraWorkers(p, sunStr).map(({workerId: ewId}) => {
            const ew = worker(ewId);
            if (!ew) return '';
            const wd = weekExtraDays(p, ewId, days);
            const wc = weekExtraCost(p, ewId, days);
            const sup = getWorkerSupport(p, ewId, sunStr);
            return `<tr style="background:#fffbeb;">
                <td class="col-name" style="position:relative;">
                    <div class="fw6" style="font-size:13px;color:var(--warning);">${esc(ew.name)}</div>
                    <div class="fs11 c-gray">${fmtMoney(effectiveWage(ew,sunStr))}/N · ngoài</div>
                    ${p.status==='active'?`<button onclick="removeWeeklyExtraWorker('${p.id}','${ewId}','${sunStr}')"
                        style="position:absolute;top:4px;right:6px;background:none;border:none;color:var(--gray-300);cursor:pointer;font-size:16px;line-height:1;">×</button>`:''}
                </td>
                ${days.map((d,i) => {
                    const ds = toYMD(d);
                    const entry = (p.extraWorkerDays||[]).find(e => e.date===ds && e.workerId===ewId);
                    const ev = entry ? (entry.value ?? (entry.amount ? 1 : 0)) : 0;
                    const isToday = ds === today;
                    return `<td class="tc ${isToday?'today-cell':''}">
                        <div class="att-cell ${attCls(ev)}"
                             onclick="toggleExtraWorkerDay('${p.id}','${ds}','${ewId}')">
                            ${attLabel(ev)}
                        </div>
                    </td>`;
                }).join('')}
                <td class="tc fw6 fs12" style="color:var(--gray-700);">${wd>0?wd+'N':'-'}</td>
                <td class="tr fw6 c-blue fs12">${(wc+sup)>0?fmtMoney(wc+sup):'-'}</td>
                <td class="tr fs12">${p.status==='active'?`<div onclick="editWorkerSupport('${p.id}','${ewId}','${sunStr}')"
                     style="cursor:pointer;padding:2px 4px;border-radius:6px;min-width:40px;text-align:right;
                            ${sup?'color:var(--warning);font-weight:700;':'color:var(--gray-300);'}">
                     ${sup?fmtMoney(sup):'+'}
                </div>`:'-'}</td>
                <td></td>
            </tr>`;
        }).join('')}
        ${p.status==='active'?`<tr style="background:var(--warning-light);">
            <td colspan="${days.length+4}" style="padding:6px 10px;">
                <button onclick="openModal('add-weekly-extra','${p.id}|${sunStr}')"
                        style="background:none;border:1.5px dashed var(--warning);border-radius:8px;
                               color:var(--warning);font-size:12px;font-weight:700;cursor:pointer;
                               padding:5px 14px;transition:all 0.15s;">
                    👷 + Thêm thợ ngoài
                </button>
            </td>
        </tr>`:''}
        </tbody>
        <tfoot><tr>
            <td class="col-name">Tổng tuần</td>
            <td colspan="${days.length}"></td>
            <td></td>
            <td class="tr" style="color:var(--primary);">${fmtMoney(weekTotal)}</td>
            <td></td>
            <td></td>
        </tr></tfoot>
    </table>
    </div>
    ${(()=>{
        const absentWorkers = projWorkers(p).filter(w => {
            if (w.leaveDate && w.leaveDate <= sunStr) return false; // nghỉ luôn → không hiển thị ở đây
            return (p.workerAbsentWeeks||[]).some(a => a.workerId===w.id && a.weekStart===sunStr);
        });
        if (!absentWorkers.length) return '';
        return `<div style="margin-top:8px;padding:8px 12px;background:var(--gray-50);border-radius:10px;border:1px solid var(--gray-200);">
            <div style="font-size:11px;font-weight:600;color:var(--gray-400);margin-bottom:6px;">NGHỈ TUẦN NÀY</div>
            ${absentWorkers.map(w=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;">
                <span style="font-size:13px;color:var(--gray-400);">👤 ${esc(w.name)}</span>
                ${p.status==='active'?`<button onclick="restoreWorkerThisWeek('${p.id}','${w.id}','${sunStr}')"
                    style="font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--gray-300);
                           background:white;color:var(--gray-600);cursor:pointer;">↩ Cho đi làm lại</button>`:''}
            </div>`).join('')}
        </div>`;
    })()}

    <div class="card" style="margin-top:14px;">
        <div class="card-header">
            <span class="card-title">💵 Thanh toán công tuần này</span>
            ${p.status==='active'?`<button class="btn btn-success btn-sm" onclick="openModal('payment','${toYMD(sunday)}')">+ Ghi nhận</button>`:''}
        </div>
        ${renderPayments(p, toYMD(sunday), weekTotal)}
    </div>`;
}

function renderPayments(p, wStart, weekTotal) {
    const pays    = (p.payments||[]).filter(x=>x.weekStart===wStart);
    const paidSum = pays.reduce((s,x)=>s+x.amount,0);
    const diff    = weekTotal - paidSum;

    if (!pays.length) return `<div style="font-size:13px;color:var(--gray-400);">
        Tuần này tính được <strong>${fmtMoney(weekTotal)}</strong>. Chưa ghi nhận thanh toán.
    </div>`;

    return `
    <div class="info-box ${diff>0?'yellow':'green'}" style="margin-bottom:8px;">
        Tính được: <strong>${fmtMoney(weekTotal)}</strong> · Đã trả: <strong>${fmtMoney(paidSum)}</strong>
        ${diff>0?` · Còn: <strong>${fmtMoney(diff)}</strong>`:'&nbsp;✅ Đủ rồi'}
    </div>
    ${pays.map(pay=>`<div class="pay-row">
        <div style="flex:1;">
            <span class="fw6 c-green">${fmtMoney(pay.amount)}</span>
            <span class="c-gray fs12"> · ${fmtDate(pay.date)}</span>
            ${pay.note?`<span class="c-gray fs12"> · ${esc(pay.note)}</span>`:''}
        </div>
        <button class="btn btn-ghost btn-xs" onclick="deletePayment('${p.id}','${pay.id}')">✕</button>
    </div>`).join('')}`;
}

// ── EXPENSES ──────────────────────────────────────────────
function renderExpenses(p) {
    const exps = [...(p.expenses||[])].sort((a,b)=>b.date>a.date?1:-1);
    const mc = materialCost(p), oc = otherCost(p);
    const isMat = e => e.type === 'material';
    return `
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Vật liệu</div><div class="stat-value neutral">${fmtMoney(mc)}</div></div>
        <div class="stat-card"><div class="stat-label">Chi phí khác</div><div class="stat-value neutral">${fmtMoney(oc)}</div></div>
        <div class="stat-card"><div class="stat-label">Tổng phát sinh</div><div class="stat-value negative">${fmtMoney(mc+oc)}</div></div>
    </div>
    <div class="card" style="padding:0;">
        <div class="card-header" style="padding:10px 14px;">
            <span class="card-title">📝 Chi phí (${exps.length})</span>
            ${p.status==='active'?`<button class="btn btn-primary btn-sm" onclick="openModal('add-expense')">+ Thêm</button>`:''}
        </div>
        ${!exps.length
            ? `<div class="empty" style="padding:24px;"><div class="empty-icon">📋</div><div class="empty-desc">Chưa có chi phí nào</div></div>`
            : exps.map((e,idx)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;
                    border-top:${idx===0?'1px solid var(--gray-100)':'0'};
                    border-bottom:1px solid var(--gray-100);">
            <!-- icon loại -->
            <div style="width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;
                        background:${isMat(e)?'#fef9c3':'#f0fdf4'};">
                ${isMat(e)?'🧱':'📦'}
            </div>
            <!-- nội dung -->
            <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                    ${esc(e.desc||'–')}
                </div>
                <div class="fs11 c-gray">${fmtDate(e.date)}${e.payer?` · <span style="font-weight:600;color:var(--gray-600);">${esc(e.payer)}</span>`:''}</div>
            </div>
            <!-- số tiền + actions -->
            <div style="text-align:right;flex-shrink:0;">
                <div style="font-size:14px;font-weight:700;color:var(--danger);">${fmtMoney(e.amount)}</div>
                ${p.status==='active'?`<div style="margin-top:2px;">
                    <button class="btn btn-ghost btn-xs" onclick="editExpense('${p.id}','${e.id}')" style="padding:1px 4px;">✏️</button>
                    <button class="btn btn-ghost btn-xs" onclick="deleteExpense('${p.id}','${e.id}')" style="padding:1px 4px;">🗑️</button>
                </div>`:''}
            </div>
        </div>`).join('')}
        <div style="padding:10px 14px;background:var(--gray-50);border-top:2px solid var(--gray-200);
                    display:flex;justify-content:space-between;font-weight:700;">
            <span>Tổng cộng</span>
            <span style="color:var(--danger);">${fmtMoney(mc+oc)}</span>
        </div>
    </div>`;
}

// ── ADVANCES ──────────────────────────────────────────────
function renderAdvances(p) {
    const advs  = [...(p.advances||[])].sort((a,b)=>b.date>a.date?1:-1);
    const total = totalAdvances(p);
    const rev   = p.revenue || 0;
    return `
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Đã nhận tạm ứng</div><div class="stat-value positive">${fmtMoney(total)}</div></div>
        <div class="stat-card"><div class="stat-label">Giá trị HĐ</div><div class="stat-value blue">${fmtMoney(rev)}</div></div>
        <div class="stat-card"><div class="stat-label">Còn lại chưa nhận</div><div class="stat-value ${Math.max(0,rev-total)>0?'warning':'neutral'}">${fmtMoney(Math.max(0,rev-total))}</div></div>
    </div>
    <div class="card">
        <div class="card-header">
            <span class="card-title">💵 Tạm ứng từ chủ nhà (${advs.length})</span>
            ${p.status==='active'?`<button class="btn btn-primary btn-sm" onclick="openModal('add-advance')">+ Thêm</button>`:''}
        </div>
        ${!advs.length ? `<div class="empty"><div class="empty-icon">💵</div><div class="empty-title">Chưa có tạm ứng</div><div class="empty-desc">Ghi nhận mỗi lần nhận tiền từ chủ nhà</div></div>` : `
        <table class="data-table">
            <thead><tr><th>Ngày</th><th>Ghi chú</th><th class="tr">Số tiền</th><th style="width:36px;"></th></tr></thead>
            <tbody>
            ${advs.map((a,i)=>`<tr>
                <td class="fs12 c-gray">${fmtDate(a.date)}</td>
                <td style="font-size:13px;">${esc(a.note||`Đợt ${advs.length-i}`)}</td>
                <td class="tr fw6 c-green fs12">${fmtMoney(a.amount)}</td>
                <td>${p.status==='active'?`<button class="btn btn-ghost btn-xs" onclick="deleteAdvance('${p.id}','${a.id}')">🗑️</button>`:''}</td>
            </tr>`).join('')}
            </tbody>
            <tfoot><tr>
                <td colspan="2" class="fw7">Tổng đã nhận</td>
                <td class="tr c-green fw7">${fmtMoney(total)}</td><td></td>
            </tr></tfoot>
        </table>`}
    </div>`;
}

// ── OVERVIEW ──────────────────────────────────────────────
function renderOverview(p) {
    const lc  = laborCost(p), mc = materialCost(p), oc = otherCost(p);
    const tc  = lc + mc + oc;
    const adv = totalAdvances(p);
    const rev = p.revenue || 0;
    const pft = adv - tc;
    const paid = totalPaid(p), owed = Math.max(0, lc - paid);
    const pct  = adv > 0 ? (pft/adv*100).toFixed(1) : null;
    const workers = projWorkers(p);

    return `
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Giá trị HĐ</div>
            <div class="stat-value blue">${fmtMoney(rev)}</div>
            <button class="btn btn-outline btn-xs" style="margin-top:8px;" onclick="openModal('set-revenue')">Cập nhật</button>
        </div>
        <div class="stat-card">
            <div class="stat-label">Đã nhận tạm ứng</div>
            <div class="stat-value positive">${fmtMoney(adv)}</div>
            <div class="fs11 c-gray" style="margin-top:3px;">Còn lại: ${fmtMoney(Math.max(0,rev-adv))}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Tổng chi phí</div>
            <div class="stat-value negative">${fmtMoney(tc)}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">${pft>=0?'💰 Lợi nhuận':'📉 Thua lỗ'}</div>
            <div class="stat-value ${pft>=0?'positive':'negative'}">${pft<0?'-':''}${fmtMoney(Math.abs(pft))}</div>
            ${pct!==null?`<div class="fs11 c-gray" style="margin-top:3px;">${pct}% / tạm ứng</div>`:''}
        </div>
    </div>

    <div class="two-col">
        <div class="card">
            <div class="card-header"><span class="card-title">📊 Báo cáo lãi/lỗ</span></div>
            <table class="pl-table"><tbody>
                <tr><td style="color:var(--success);font-weight:700;">THU</td><td></td></tr>
                <tr><td style="padding-left:12px;">Tạm ứng từ chủ nhà</td><td class="c-green">${fmtMoney(adv)}</td></tr>
                <tr><td style="color:var(--danger);font-weight:700;padding-top:10px;">CHI</td><td></td></tr>
                <tr><td style="padding-left:12px;">Nhân công</td><td>${fmtMoney(lc)}</td></tr>
                <tr><td style="padding-left:24px;" class="fs12 c-gray">Đã trả thợ</td><td class="c-green fs12">-${fmtMoney(paid)}</td></tr>
                <tr><td style="padding-left:24px;" class="fs12 c-gray">Còn nợ thợ</td><td class="${owed>0?'c-orange':'c-green'} fs12">${fmtMoney(owed)}</td></tr>
                <tr><td style="padding-left:12px;">Vật liệu</td><td>${fmtMoney(mc)}</td></tr>
                <tr><td style="padding-left:12px;">Chi phí khác</td><td>${fmtMoney(oc)}</td></tr>
            </tbody>
            <tfoot><tr>
                <td class="fw7" style="font-size:15px;">${pft>=0?'💰 Lợi nhuận':'📉 Lỗ'}</td>
                <td class="${pft>=0?'c-green':'c-red'}" style="font-size:16px;">${pft<0?'-':''}${fmtMoney(Math.abs(pft))}</td>
            </tr></tfoot></table>
        </div>

        <div class="card">
            <div class="card-header"><span class="card-title">👷 Từng thợ</span></div>
            ${!workers.length ? `<div class="empty" style="padding:16px 0;"><div class="empty-desc">Chưa có thợ</div></div>` : `
            <table class="data-table">
                <thead><tr><th>Thợ</th><th class="tc">Ngày</th><th class="tr">Tổng lương</th></tr></thead>
                <tbody>
                ${workers.map(w => {
                    const td=workerTotalDays(p,w), tp=workerLaborCost(p,w);
                    return `<tr>
                        <td><div class="fw6 fs12">${esc(w.name)}</div><div class="fs11 c-gray">${esc(w.role||'')}</div></td>
                        <td class="tc fw6 fs12">${td>0?td+'N':'-'}</td>
                        <td class="tr fw6 c-blue fs12">${tp>0?fmtMoney(tp):'-'}</td>
                    </tr>`;
                }).join('')}
                </tbody>
                <tfoot><tr>
                    <td class="fw7">Tổng</td>
                    <td class="tc fw7">${workers.reduce((s,w)=>s+workerTotalDays(p,w),0)}N</td>
                    <td class="tr fw7 c-blue">${fmtMoney(lc)}</td>
                </tr></tfoot>
            </table>`}
        </div>
    </div>`;
}
