function openModal(type, extra) {
    modalType = type; modalExtra = extra;
    document.getElementById('modal-content').innerHTML = modalContent();
    document.getElementById('modal-overlay').style.display = 'flex';
    const first = document.querySelector('#modal-content input, #modal-content select');
    if (first) setTimeout(()=>first.focus(), 80);
    if (type === 'manage-users') loadUsersList();
}
function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    modalType = null; modalExtra = null;
}
function overlayClose(e) { if (e.target === e.currentTarget) closeModal(); }

function modalContent() {
    switch(modalType) {
        case 'new-proj':       return mNewProj();
        case 'edit-proj':      return mEditProj();
        case 'add-worker':     return mAddWorker();
        case 'edit-worker':    return mEditWorker();
        case 'set-worker-leave': return mSetWorkerLeave(modalExtra);
        case 'raise-wage':     return mRaiseWage();
        case 'assign-workers': return mAssignWorkers();
        case 'add-expense':    return mAddExpense();
        case 'edit-expense':   return mEditExpense(modalExtra);
        case 'add-advance':    return mAddAdvance();
        case 'payment':        return mPayment();
        case 'set-revenue':    return mSetRevenue();
        case 'confirm':        return mConfirm();
        case 'add-weekly-extra': return mAddWeeklyExtra();
        case 'firebase-setup': return mFirebaseSetup();
        case 'sheets-sync':    return mSheetsSync();
        case 'manage-users':   return mManageUsers();
        default: return '';
    }
}

function $v(id) { return (document.getElementById(id)||{}).value || ''; }
function $f(id) { return parseFloat($v(id)) || 0; }

    const url = document.getElementById('sheets-url-input')?.value?.trim();

        alert('URL không hợp lệ. Phải bắt đầu bằng https://script.google.com');
        return;

function doRemoveSheetsUrl() {
    if (!confirm('Ngắt kết nối Sheets? Dữ liệu cục bộ vẫn được giữ.')) return;
    localStorage.removeItem(SHEETS_KEY);
    updateSheetsBtn();
    closeModal();
}

async function doSyncFromSheets() {
    const url = getSheetsUrl();
    if (!url) return;
    closeModal();
    try {
        const r = await fetch(url + '?action=get', { redirect: 'follow' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const text = await r.text();
        const d = JSON.parse(text);
        if (d.error) throw new Error(d.error);
        if (!d.workers && !d.projects) throw new Error('Dữ liệu không đúng định dạng');
        if (!confirm(`Tải về: ${(d.workers||[]).length} thợ, ${(d.projects||[]).length} công trình.\nGhi đè dữ liệu app hiện tại?`)) return;
        S.workers  = d.workers  || [];
        S.projects = d.projects || [];
        save(); renderAll();
        alert('✅ Đồng bộ thành công từ Google Sheets!');
    } catch(e) {
        alert('❌ Lỗi kết nối Sheets:\n' + e.message + '\n\nKiểm tra lại URL Apps Script và đảm bảo đã deploy đúng cách.');
    }
}

async function doSyncToSheets() {
    const url = getSheetsUrl();
    if (!url) return;
    if (!confirm('Đẩy toàn bộ dữ liệu app lên Google Sheets?\n(Sẽ ghi đè dữ liệu trên Sheets)')) return;
    closeModal();
    try {
        const body = JSON.stringify({ workers: S.workers, projects: S.projects });
        // Dùng no-cors để tránh lỗi CORS với Apps Script
        await fetch(url, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body
        });
        alert('✅ Đã gửi dữ liệu lên Google Sheets!');
    } catch(e) {
        alert('❌ Lỗi: ' + e.message);
    }
}

function toggleExtraWorkerDay(projId, date, workerId) {
    const p = proj(projId);
    if (!p) return;
    if (!p.extraWorkerDays) p.extraWorkerDays = [];
    const i = p.extraWorkerDays.findIndex(e => e.date === date && e.workerId === workerId);
    const cur = i >= 0 ? (p.extraWorkerDays[i].value ?? 1) : 0;
    const next = cycleAttVal(cur);
    if (i >= 0) p.extraWorkerDays.splice(i, 1);
    if (next > 0) {
        const w = worker(workerId);
        p.extraWorkerDays.push({ id: uid(), date, workerId, value: next, amount: next * effectiveWage(w, date) });
    }
    save();
    const scrollY = window.scrollY;
    const wrap    = document.querySelector('.att-table-wrap');
    const scrollX = wrap ? wrap.scrollLeft : 0;
    const tc = document.getElementById('tab-content');
    if (tc) tc.innerHTML = renderTab(p);

    if (newWrap) newWrap.scrollLeft = scrollX;

function exportProjectExcel() {
    const p = cur();
    if (!p) return;
    const wb = XLSX.utils.book_new();

    // ── Sheet 1: CHẤM CÔNG ──────────────────────────────────
    const attRows = [['TUẦN', 'NGÀY', 'TÊN THỢ', 'ĐƠN GIÁ', 'CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'TỔNG NGÀY', 'THÀNH TIỀN']];
    const DAYS = ['CN','T2','T3','T4','T5','T6','T7'];

    // Gom tất cả các tuần đã chấm công
    const allDates = new Set();
    (p.attendance || []).forEach(r => allDates.add(r.date));
    // Tìm các tuần (Sunday) từ các ngày đã chấm
    const weeks = new Set();
    allDates.forEach(d => weeks.add(toYMD(getSunday(new Date(d)))));
    const sortedWeeks = Array.from(weeks).sort();

    sortedWeeks.forEach((wk, wi) => {
        const sun = new Date(wk);
        const weekDates = Array.from({length:7}, (_,i) => toYMD(addDays(sun,i)));
        const workers = projWorkers(p);
        workers.forEach(w => {
            const wage = effectiveWage(w, wk);
            const vals = weekDates.map(d => {
                const v = getAtt(p, w.id, d);
                return v === 1 ? 1 : v === 0.5 ? 0.5 : v === 'TC' ? 'TC' : '';
            });
            const numericDays = vals.reduce((s,v) => s + (v==='TC'?1 : (v||0)), 0);
            const total = numericDays * wage;
            if (vals.some(v => v !== '')) {
                attRows.push([wi+1, wk, w.name, wage, ...vals, numericDays, total]);
            }
        });
    });
    const ws1 = XLSX.utils.aoa_to_sheet(attRows);
    // Định dạng tiền
    ws1['!cols'] = [{wch:6},{wch:12},{wch:14},{wch:12},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:10},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws1, 'Chấm Công');

    // ── Sheet 2: CHI PHÍ ────────────────────────────────────
    const expRows = [['NGÀY', 'LOẠI', 'NỘI DUNG', 'SỐ TIỀN', 'GHI CHÚ']];
    (p.expenses || []).forEach(e => {
        expRows.push([e.date, e.type==='material'?'Vật tư':'Khác', e.desc, e.amount, e.note||'']);
    });
    const ws2 = XLSX.utils.aoa_to_sheet(expRows);
    ws2['!cols'] = [{wch:12},{wch:8},{wch:30},{wch:14},{wch:20}];
    XLSX.utils.book_append_sheet(wb, ws2, 'Chi Phí');

    // ── Sheet 3: TẠM ỨNG ────────────────────────────────────
    const advRows = [['NGÀY', 'SỐ TIỀN', 'GHI CHÚ']];
    (p.advances || []).forEach(a => {
        advRows.push([a.date, a.amount, a.note||'']);
    });
    const ws3 = XLSX.utils.aoa_to_sheet(advRows);
    ws3['!cols'] = [{wch:12},{wch:14},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws3, 'Tạm Ứng');

    // ── Sheet 4: TỔNG QUAN ──────────────────────────────────
    const lc = laborCost(p), mc = materialCost(p), oc = otherCost(p);
    const tc = lc + mc + oc;
    const adv = totalAdvances(p);
    const ovRows = [
        ['TỔNG QUAN CÔNG TRÌNH'],
        [],
        ['Tên công trình', p.name],
        ['Trạng thái', p.status==='active'?'Đang thi công':'Hoàn thành'],
        ['Ngày bắt đầu', p.startDate||''],
        ['Ngày kết thúc', p.endDate||''],
        [],
        ['CHI PHÍ', ''],
        ['Chi phí nhân công', lc],
        ['Chi phí vật tư', mc],
        ['Chi phí khác', oc],
        ['TỔNG CHI PHÍ', tc],
        [],
        ['ĐÃ NHẬN TẠM ỨNG', adv],
        ['CÒN LẠI / THỪA', adv - tc],
    ];
    const ws4 = XLSX.utils.aoa_to_sheet(ovRows);
    ws4['!cols'] = [{wch:22},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws4, 'Tổng Quan');

    // Xuất file
    const fname = `${p.name.replace(/[\/\\:*?"<>|]/g,'_')}-${todayYMD()}.xlsx`;
    XLSX.writeFile(wb, fname);
}

// ========== FLOOR PLAN ==========
function renderFloorPlanView() {
    if (!S.fp) S.fp = {};
    const D = {
        w:5, l:15, numFloors:2, floorH:3.3, groundH:3.6,
        beds:3, baths:2, masterBed:false,
        living:true, kitchen:true, dining:false, altar:false, garage:false,
        laundry:false, maidRoom:false, balcony:false, rooftop:false,
        facing:'south', mainDoor:'front', alley:'none', neighbor:'both',
        stairType:'straight', stairPos:'middle',
        style:'modern', roofType:'flat', exteriorColor:'#f5f0e8', material:'paint',
        garden:false, fence:false, furniture:true,
    };
    Object.keys(D).forEach(k => { if (S.fp[k] === undefined) S.fp[k] = D[k]; });
    if (!S.fpTab) S.fpTab = 'size';
    const fp = S.fp;
    const area = (fp.w * fp.l).toFixed(1);
    const totalArea = (fp.w * fp.l * fp.numFloors).toFixed(1);
    const tabs = [
        {k:'size',   icon:'📐', label:'Kích thước'},
        {k:'rooms',  icon:'🛏️', label:'Phòng'},
        {k:'orient', icon:'🧭', label:'Hướng'},
        {k:'style',  icon:'🎨', label:'Phong cách'},
        {k:'3d',     icon:'📦', label:'3D'},
    ];
    return `
    <div class="main-header">
        <div>
            <div class="main-title">🏠 Phác thảo sơ đồ nhà</div>
            <div class="main-meta">${area} m²/sàn • Tổng ${totalArea} m² • Sơ đồ tự động cập nhật</div>
        </div>
        <button onclick="fpDownload()" class="btn btn-outline" style="font-size:13px;white-space:nowrap;">⬇ Tải SVG</button>
    </div>
    <div class="tab-content">
        <div class="two-col" style="align-items:start;">

        <!-- FORM PANEL -->
        <div class="card" style="padding:0;overflow:hidden;">
            <div style="display:flex;overflow-x:auto;border-bottom:1px solid var(--gray-200);background:var(--gray-50);scrollbar-width:none;">
                ${tabs.map(t => `
                <button onclick="S.fpTab='${t.k}';fpFormUpdate()"
                    style="flex:1;min-width:62px;padding:10px 4px 8px;border:none;
                    border-bottom:2px solid ${S.fpTab===t.k?'var(--primary)':'transparent'};
                    background:${S.fpTab===t.k?'white':'transparent'};
                    color:${S.fpTab===t.k?'var(--primary)':'var(--gray-500)'};
                    font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;line-height:1.6;">
                    <div style="font-size:16px;">${t.icon}</div>${t.label}
                </button>`).join('')}
            </div>
            <div id="fp-form-inner" style="padding:14px;">
                ${fpFormInner(fp)}
            </div>
        </div>

        <!-- SVG OUTPUT -->
        <div class="card" style="padding:12px;" id="fp-output">
            ${genFloorPlanSVG(fp)}

        </div>
    </div>`;
}

        <label style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100);cursor:pointer;">

    return `

        <thead><tr style="background:var(--gray-50);">

            <th style="padding:6px 8px;text-align:center;border-bottom:1px solid var(--gray-200);">Rộng</th>
            <th style="padding:6px 8px;text-align:center;border-bottom:1px solid var(--gray-200);">Dài</th>
            <th style="padding:6px 8px;text-align:center;border-bottom:1px solid var(--gray-200);">Cao</th>

        <tbody>
        ${rooms.map((r,i) => `

            <td style="padding:5px 8px;">${r.icon} ${r.name}</td>

function fpAllRoomsList(fp) {
    const { w, l, numFloors, groundH, floorH, beds, baths, living, kitchen, dining, altar, garage,
            masterBed, balcony, laundry, maidRoom, rooftop } = fp;
    const rooms = [];
    if (garage)   rooms.push({name:'Gara',              icon:'🚗', dimW:w,               dimL:3.5, dimH:groundH});
    if (living)   rooms.push({name:'Phòng khách',       icon:'🛋️', dimW:w,               dimL:4.0, dimH:groundH});
    if (kitchen)  rooms.push({name:'Bếp + phòng ăn',   icon:'🍳', dimW:w,               dimL:3.5, dimH:groundH});
    if (dining && !kitchen) rooms.push({name:'Phòng ăn',icon:'🪑', dimW:Math.round(w*.6*10)/10, dimL:3.0, dimH:groundH});
    if (altar)    rooms.push({name:'Phòng thờ',         icon:'🕯️', dimW:Math.min(w,3.0), dimL:2.5, dimH:groundH});
    if (maidRoom) rooms.push({name:'Phòng giúp việc',   icon:'🧹', dimW:2.5,             dimL:2.5, dimH:groundH});
    if (baths>=1) rooms.push({name:'WC tầng trệt',      icon:'🚿', dimW:1.8,             dimL:2.5, dimH:groundH});
    if (masterBed && beds>0) {
        rooms.push({name:'Phòng ngủ master',icon:'👑', dimW:w,    dimL:4.0, dimH:floorH});
        rooms.push({name:'Toilet master',   icon:'🚿', dimW:2.0,  dimL:2.5, dimH:floorH});
    }
    const startBed = masterBed && beds>0 ? 1 : 0;
    for (let i=startBed; i<beds; i++) {
        rooms.push({name:`Phòng ngủ ${i+1}`, icon:'🛏️', dimW:Math.min(w,3.5), dimL:3.5, dimH:floorH});
    }
    for (let i=1; i<baths; i++) rooms.push({name:`Toilet ${i+1}`, icon:'🚿', dimW:1.8, dimL:2.5, dimH:floorH});
    if (balcony)  rooms.push({name:'Ban công',   icon:'🌿', dimW:w,   dimL:1.5, dimH:floorH});
    if (laundry)  rooms.push({name:'Phòng giặt', icon:'🪣', dimW:2.0, dimL:2.0, dimH:floorH});
    if (rooftop)  rooms.push({name:'Sân thượng', icon:'☀️', dimW:w,   dimL:Math.round(l/numFloors*10)/10, dimH:0});
    return rooms;
}

function fpFormUpdate() {
    const inner = document.getElementById('fp-form-inner');
    if (inner) inner.innerHTML = fpFormInner(S.fp);
}

function fpRedraw() {
    const el = document.getElementById('fp-output');
    if (el) el.innerHTML = genFloorPlanSVG(S.fp);
    const dt = document.getElementById('fp-dim-table');
    if (dt) dt.innerHTML = fpDimTable(S.fp);
}

function fpDownload() {
    const svgs = document.querySelectorAll('#fp-output svg');
    if (!svgs.length) return;
    // Combine all floor SVGs into one file
    const allSVG = Array.from(svgs).map(s => s.outerHTML).join('\n');
    const blob = new Blob([allSVG], {type:'image/svg+xml'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `so-do-nha-${S.fp.w}x${S.fp.l}m.svg`;
    a.click();
}

// Build room list per floor
function fpBuildFloors(fp) {
    const { w, l, numFloors, beds, baths, living, kitchen, dining, altar, garage,
            masterBed, balcony, laundry, maidRoom, rooftop } = fp;

    // Ground floor
    const ground = [];
    if (garage)   ground.push({name:'Gara',          area:w*3.5,              color:'#f1f5f9', icon:'🚗'});
    if (living)   ground.push({name:'Phòng khách',   area:w*4,                color:'#dbeafe', icon:'🛋️'});
    if (altar)    ground.push({name:'Phòng thờ',     area:Math.max(6,w*2),   color:'#fee2e2', icon:'🕯️'});
    if (kitchen)  ground.push({name:'Bếp + Ăn',      area:w*3.5,              color:'#fef9c3', icon:'🍳'});
    else if (dining) ground.push({name:'Phòng ăn',   area:w*2.5,              color:'#fef9c3', icon:'🪑'});
    if (maidRoom) ground.push({name:'Giúp việc',     area:Math.max(6,w*1.5), color:'#f0fdf4', icon:'🧹'});
    if (baths>=1) ground.push({name:'WC',            area:Math.max(4,w*1.2), color:'#f3e8ff', icon:'🚿'});
    if (numFloors>1) ground.push({name:'Cầu thang',  area:Math.max(5,w*1.4), color:'#e2e8f0', icon:'🪜'});

    const floors = [ground];
    let bedLeft = beds, bathLeft = Math.max(0, baths - 1);
    let masterDone = false;

    for (let f = 1; f < numFloors; f++) {
        const fl = [];
        fl.push({name:'Cầu thang', area:Math.max(5,w*1.4), color:'#e2e8f0', icon:'🪜'});
        if (!masterDone && masterBed && bedLeft > 0) {
            fl.push({name:'Phòng ngủ Master', area:Math.max(16,w*3.5), color:'#fce7f3', icon:'👑'});
            fl.push({name:'Toilet Master',    area:Math.max(5,w*1.4),  color:'#f3e8ff', icon:'🚿'});
            masterDone = true; bedLeft--;
            bathLeft = Math.max(0, bathLeft - 1);
        }
        const bedsThisFloor = Math.min(2, bedLeft);
        const bedOffset = beds - bedLeft + (masterBed?1:0);
        for (let i=0; i<bedsThisFloor; i++) {
            fl.push({name:`Phòng ngủ ${bedOffset+i+1}`, area:Math.max(12,w*2.8), color:'#dcfce7', icon:'🛏️'});
        }
        if (bathLeft > 0) { fl.push({name:'WC', area:Math.max(4,w*1.2), color:'#f3e8ff', icon:'🚿'}); bathLeft--; }
        if (balcony) fl.push({name:'Ban công', area:Math.max(4,w*1.5), color:'#f0fdf4', icon:'🌿'});
        if (laundry && f === numFloors-1) fl.push({name:'Phòng giặt', area:Math.max(4,w*1.5), color:'#e0f2fe', icon:'🪣'});
        bedLeft -= bedsThisFloor;
        floors.push(fl);
    }
    if (rooftop) floors.push([{name:'Sân thượng', area:w*(l/numFloors), color:'#e0f2fe', icon:'☀️'}]);
    return floors;
}

// BSP layout
function fpBSP(rect, rooms) {
    if (!rooms.length) return [];
    if (rooms.length === 1) return [{...rooms[0], x:rect.x, y:rect.y, w:rect.w, h:rect.h}];
    const totalArea = rooms.reduce((s,r) => s + (r.area||10), 0);
    let bestSplit = 1, bestDiff = Infinity, acc = 0;
    for (let i = 1; i < rooms.length; i++) {
        acc += (rooms[i-1].area||10);
        const diff = Math.abs(acc/totalArea - 0.5);
        if (diff < bestDiff) { bestDiff = diff; bestSplit = i; }
    }
    const groupA = rooms.slice(0, bestSplit);
    const groupB = rooms.slice(bestSplit);
    const ratioA = groupA.reduce((s,r)=>s+(r.area||10),0) / totalArea;
    if (rect.w >= rect.h) {
        const splitX = rect.w * ratioA;
        return [...fpBSP({x:rect.x, y:rect.y, w:splitX, h:rect.h}, groupA),
                ...fpBSP({x:rect.x+splitX, y:rect.y, w:rect.w-splitX, h:rect.h}, groupB)];
    } else {
        const splitY = rect.h * ratioA;
        return [...fpBSP({x:rect.x, y:rect.y, w:rect.w, h:splitY}, groupA),
                ...fpBSP({x:rect.x, y:rect.y+splitY, w:rect.w, h:rect.h-splitY}, groupB)];
    }
}

// Compass SVG
function fpCompassSVG(facing, cx, cy) {
    const dirMap = {south:180,north:0,east:90,west:270,southeast:135,southwest:225,northeast:45,northwest:315};
    const angle = dirMap[facing] || 0;
    const r = 14;
    return `<g transform="translate(${cx},${cy})">
        <circle r="${r}" fill="white" stroke="#94a3b8" stroke-width="1.5" opacity="0.92"/>
        <g transform="rotate(${angle})">
            <polygon points="0,${-r*.72} ${r*.22},0 0,${r*.38}" fill="#ef4444"/>
            <polygon points="0,${r*.72} ${r*.22},0 0,${r*.38}" fill="#94a3b8"/>
        </g>
        <text y="1" text-anchor="middle" dominant-baseline="middle" font-size="6" font-weight="700" fill="#1e293b">N</text>
    </g>`;
}

// Simple furniture hints inside rooms
function fpFurnitureSVG(icon, rx, ry, rw, rh) {
    if (rw < 40 || rh < 35) return '';
    if (icon === '🛏️') return `
        <rect x="${rx+4}" y="${ry+rh*0.45}" width="${rw-8}" height="${rh*0.42}" fill="none" stroke="#86efac" stroke-width="1.2" rx="3"/>
        <rect x="${rx+4}" y="${ry+4}" width="${rw*.42}" height="${rh*.32}" fill="none" stroke="#bbf7d0" stroke-width="1" rx="2"/>
        <rect x="${rx+rw*.54}" y="${ry+4}" width="${rw*.42}" height="${rh*.32}" fill="none" stroke="#bbf7d0" stroke-width="1" rx="2"/>`;
    if (icon === '🛋️' && rw > 55) return `
        <rect x="${rx+6}" y="${ry+rh*.42}" width="${rw-12}" height="${rh*.38}" fill="none" stroke="#93c5fd" stroke-width="1.2" rx="4"/>
        <rect x="${rx+6}" y="${ry+rh*.32}" width="${rw*.22}" height="${rh*.48}" fill="none" stroke="#93c5fd" stroke-width="1" rx="2"/>
        <rect x="${rx+rw-.22*rw-6}" y="${ry+rh*.32}" width="${rw*.22}" height="${rh*.48}" fill="none" stroke="#93c5fd" stroke-width="1" rx="2"/>`;
    if (icon === '🍳' && rw > 55) return `
        <rect x="${rx+4}" y="${ry+4}" width="${rw*.38}" height="${rh*.52}" fill="none" stroke="#fcd34d" stroke-width="1" rx="2"/>
        <rect x="${rx+4}" y="${ry+rh*.58}" width="${rw-8}" height="${rh*.32}" fill="none" stroke="#fcd34d" stroke-width="1" rx="2"/>`;
    if (icon === '🚿') return `
        <rect x="${rx+4}" y="${ry+rh*.3}" width="${rw-8}" height="${rh*.55}" fill="none" stroke="#c4b5fd" stroke-width="1" rx="3"/>`;
    if (icon === '🚗' && rw > 60) return `
        <rect x="${rx+rw*.1}" y="${ry+rh*.2}" width="${rw*.8}" height="${rh*.6}" fill="none" stroke="#cbd5e1" stroke-width="1.2" rx="4"/>`;
    return '';
}

// Generate SVG for one floor
function fpFloorSVG(rooms, floorWidth, floorHeight, scale, floorLabel, fp, isGround) {
    const W = floorWidth * scale, H = floorHeight * scale;
    const PAD = 2;
    const laid = fpBSP({x:0, y:0, w:floorWidth, h:floorHeight}, rooms);

    const roomsSVG = laid.map(r => {
        const rx = r.x*scale+PAD, ry = r.y*scale+PAD;
        const rw = r.w*scale-PAD*2, rh = r.h*scale-PAD*2;
        const cx = rx+rw/2, cy = ry+rh/2;
        const areaM = (r.w*r.h).toFixed(1);
        const fs = Math.max(9, Math.min(13, rw/8));
        const is = Math.max(12, Math.min(20, rh/4));
        const showIcon = rw>40 && rh>36;
        const showArea = rw>50 && rh>48;
        const furn = fp.furniture ? fpFurnitureSVG(r.icon, rx, ry, rw, rh) : '';
        return `
        <rect x="${rx}" y="${ry}" width="${rw}" height="${rh}" fill="${r.color}" stroke="#94a3b8" stroke-width="1.5" rx="3"/>
        ${furn}
        ${showIcon?`<text x="${cx}" y="${cy-(showArea?8:2)}" text-anchor="middle" font-size="${is}" dominant-baseline="middle">${r.icon||''}</text>`:''}
        <text x="${cx}" y="${cy+(showIcon?is*.6:0)}" text-anchor="middle" dominant-baseline="middle"
              font-size="${fs}" font-weight="600" fill="#334155">${r.name}</text>
        ${showArea?`<text x="${cx}" y="${cy+(showIcon?is*.6:0)+fs+3}" text-anchor="middle" dominant-baseline="middle"
              font-size="${Math.max(8,fs-2)}" fill="#64748b">${areaM}m²</text>`:''}`;
    }).join('');

    // Main door indicator
    let doorSVG = '';
    if (isGround) {
        const dLabel = `<text text-anchor="middle" font-size="9" fill="#2563eb" font-weight="700">Cửa</text>`;
        if (fp.mainDoor==='front')  doorSVG=`<polygon points="${W/2-7},${H+6} ${W/2+7},${H+6} ${W/2},${H-2}" fill="#2563eb"/><text x="${W/2}" y="${H+18}" text-anchor="middle" font-size="9" fill="#2563eb" font-weight="700">Cửa chính</text>`;
        else if (fp.mainDoor==='back')  doorSVG=`<polygon points="${W/2-7},-6 ${W/2+7},-6 ${W/2},2" fill="#2563eb"/><text x="${W/2}" y="-12" text-anchor="middle" font-size="9" fill="#2563eb" font-weight="700">Cửa chính</text>`;
        else if (fp.mainDoor==='left')  doorSVG=`<polygon points="-6,${H/2-7} -6,${H/2+7} 2,${H/2}" fill="#2563eb"/>`;
        else if (fp.mainDoor==='right') doorSVG=`<polygon points="${W+6},${H/2-7} ${W+6},${H/2+7} ${W-2},${H/2}" fill="#2563eb"/>`;
    }

    // Neighbor thick walls
    let neighborSVG = '';
    if (fp.neighbor==='both'||fp.neighbor==='left')  neighborSVG+=`<line x1="1.5" y1="0" x2="1.5" y2="${H}" stroke="#64748b" stroke-width="5" opacity=".5"/>`;
    if (fp.neighbor==='both'||fp.neighbor==='right') neighborSVG+=`<line x1="${W-1.5}" y1="0" x2="${W-1.5}" y2="${H}" stroke="#64748b" stroke-width="5" opacity=".5"/>`;

    // Alley indicator
    let alleySVG = '';
    if (fp.alley==='left'||fp.alley==='both')  alleySVG+=`<rect x="-10" y="0" width="8" height="${H}" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="1"/>`;
    if (fp.alley==='right'||fp.alley==='both') alleySVG+=`<rect x="${W+2}" y="0" width="8" height="${H}" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="1"/>`;

    // Garden
    let gardenSVG = '';
    if (fp.garden && isGround) {
        const gH = Math.max(20, H*.15);
        gardenSVG = `<rect x="0" y="${H+36}" width="${W}" height="${gH}" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1" rx="2"/>
        <text x="${W/2}" y="${H+36+gH/2}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#059669">🌿 Sân vườn</text>`;
    }

    // Fence
    let fenceSVG = '';
    if (fp.fence && isGround) {
        fenceSVG = `<rect x="-4" y="-4" width="${W+8}" height="4" fill="#9ca3af" rx="1"/>`;
    }

    // Dimension annotations
    const dc = '#64748b', ds = 10;
    const extraTop = (fp.mainDoor==='back') ? 20 : 0;
    const dimW = `
        <line x1="0" y1="${H+20}" x2="${W}" y2="${H+20}" stroke="${dc}" stroke-width="1"/>
        <line x1="0" y1="${H+16}" x2="0" y2="${H+24}" stroke="${dc}" stroke-width="1"/>
        <line x1="${W}" y1="${H+16}" x2="${W}" y2="${H+24}" stroke="${dc}" stroke-width="1"/>
        <text x="${W/2}" y="${H+32}" text-anchor="middle" font-size="${ds}" fill="${dc}">${floorWidth}m</text>`;
    const dimH = `
        <line x1="${W+20}" y1="0" x2="${W+20}" y2="${H}" stroke="${dc}" stroke-width="1"/>
        <line x1="${W+16}" y1="0" x2="${W+24}" y2="0" stroke="${dc}" stroke-width="1"/>
        <line x1="${W+16}" y1="${H}" x2="${W+24}" y2="${H}" stroke="${dc}" stroke-width="1"/>
        <text x="${W+32}" y="${H/2}" text-anchor="middle" font-size="${ds}" fill="${dc}"
              transform="rotate(90,${W+32},${H/2})">${floorHeight}m</text>`;

    // Floor height label
    const floorHeightVal = isGround ? fp.groundH : fp.floorH;
    const heightLabel = `<text x="${W+20}" y="${H+44}" text-anchor="middle" font-size="9" fill="${dc}" transform="rotate(0)"
        style="display:none"></text>`;

    // Compass (ground floor only, top-right)
    const compassSVG = isGround ? fpCompassSVG(fp.facing||'south', W-18, 18) : '';

    // Stair shape hint on stairs room
    const stairHint = laid.find(r=>r.icon==='🪜');
    let stairShapeSVG = '';
    if (stairHint && fp.stairType !== 'straight') {
        const sx=stairHint.x*scale+PAD+4, sy=stairHint.y*scale+PAD+4;
        const sw=stairHint.w*scale-PAD*2-8, sh=stairHint.h*scale-PAD*2-8;
        if (fp.stairType==='L')
            stairShapeSVG=`<polyline points="${sx},${sy+sh} ${sx},${sy} ${sx+sw},${sy}" fill="none" stroke="#475569" stroke-width="2"/>`;
        else if (fp.stairType==='U')
            stairShapeSVG=`<polyline points="${sx},${sy+sh} ${sx},${sy} ${sx+sw},${sy} ${sx+sw},${sy+sh}" fill="none" stroke="#475569" stroke-width="2"/>`;
        else if (fp.stairType==='spiral') {
            const scx=sx+sw/2, scy=sy+sh/2, sr=Math.min(sw,sh)/3;
            stairShapeSVG=`<circle cx="${scx}" cy="${scy}" r="${sr}" fill="none" stroke="#475569" stroke-width="2"/>
            <circle cx="${scx}" cy="${scy}" r="${sr*.5}" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>`;
        }
    }

    const totalW = W + 60, totalH = H + 60 + (fp.garden&&isGround?40:0);
    return `
    <div style="margin-bottom:4px;display:flex;align-items:center;gap:8px;">
        <span style="font-size:11px;font-weight:700;color:var(--gray-500);letter-spacing:.06em;">${floorLabel}</span>
        <span style="font-size:10px;color:var(--gray-400);">cao ${floorHeightVal}m • ${(floorWidth*floorHeight).toFixed(1)}m²</span>
    </div>
    <div style="overflow-x:auto;margin-bottom:4px;">
    <svg width="${totalW}" height="${totalH}" xmlns="http://www.w3.org/2000/svg" style="display:block;max-width:100%;">
        ${alleySVG}
        <rect x="0" y="0" width="${W}" height="${H}" fill="${fp.exteriorColor||'#fafafa'}" stroke="#1e293b" stroke-width="3" rx="2"/>
        ${neighborSVG}
        ${roomsSVG}
        ${stairShapeSVG}
        ${doorSVG}
        ${gardenSVG}
        ${fenceSVG}
        ${dimW}${dimH}
        ${compassSVG}
    </svg>
    </div>`;
}

function genFloorPlanSVG(fp) {
    const { w, l, numFloors } = fp;
    if (!w || !l || w < 2 || l < 2) return '<div class="empty"><div class="empty-desc">Nhập kích thước hợp lệ</div></div>';
    const floors = fpBuildFloors(fp);
    const floorH = parseFloat((l / (numFloors||1)).toFixed(2));
    const scale = Math.min(420 / w, 50);
    const floorNames = ['TẦNG TRỆT','TẦNG 1','TẦNG 2','TẦNG 3','TẦNG 4','TẦNG 5'];
    return floors.map((rooms, i) => {
        if (!rooms.length) return '';
        const isRoof = fp.rooftop && i === floors.length-1;
        const label = isRoof ? 'SÂN THƯỢNG' : (floorNames[i] || `TẦNG ${i}`);
        return fpFloorSVG(rooms, w, floorH, scale, label, fp, i===0);
    }).join('<div style="height:20px;border-left:3px dashed var(--gray-200);margin-left:12px;padding-left:8px;font-size:10px;color:var(--gray-400);line-height:20px;">▲</div>');
}
